name: Build

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      channel:
        description: Optional release channel override for tag builds
        required: false
        type: choice
        options:
          - prerelease
          - stable
      version:
        description: Optional version validation for manual tag dispatch
        required: false
        type: string

jobs:
  build:
    outputs:
      build_channel: ${{ steps.release_meta.outputs.build_channel }}
      publish_channel: ${{ steps.release_meta.outputs.publish_channel }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      tag_version: ${{ steps.release_meta.outputs.tag_version }}
      is_publish_event: ${{ steps.release_meta.outputs.is_publish_event }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: win32-x64,  file: glua_ls-win32-x64.zip }
          - { target: linux-x64,  file: glua_ls-linux-x64-glibc.2.17.tar.gz }
          - { target: darwin-x64, file: glua_ls-darwin-x64-experimental.tar.gz }
          - { target: darwin-arm64, file: glua_ls-darwin-arm64-experimental.tar.gz }
    continue-on-error: ${{ startsWith(matrix.target, 'darwin-') }}

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Resolve channel and version metadata
      id: release_meta
      shell: bash
      env:
        GH_EVENT_NAME: ${{ github.event_name }}
        GH_REF: ${{ github.ref }}
        GH_REF_NAME: ${{ github.ref_name }}
        GH_INPUT_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || '' }}
        GH_INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
      run: |
        SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'

        BUILD_CHANNEL="prerelease"
        PUBLISH_CHANNEL="stable"
        TAG_NAME=""
        TAG_VERSION=""
        IS_PUBLISH_EVENT="false"

        if [[ "$GH_REF" == refs/tags/* ]]; then
          TAG_NAME="$GH_REF_NAME"
          TAG_VERSION="${TAG_NAME}"
          IS_PUBLISH_EVENT="true"
          if ! [[ "$TAG_VERSION" =~ $SEMVER_RE ]]; then
            echo "Tag '$TAG_NAME' must be semver (example: 1.0.5)." >&2
            exit 1
          fi

          if [[ -n "$GH_INPUT_VERSION" && "$GH_INPUT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Manual version '$GH_INPUT_VERSION' does not match tag '$TAG_VERSION'." >&2
            exit 1
          fi

          case "$GH_INPUT_CHANNEL" in
            stable)
              BUILD_CHANNEL="stable"
              PUBLISH_CHANNEL="stable"
              ;;
            prerelease)
              BUILD_CHANNEL="prerelease"
              PUBLISH_CHANNEL="prerelease"
              ;;
            "")
              IFS='.' read -r _ _ PATCH <<< "$TAG_VERSION"
              if (( PATCH == 0 )); then
                BUILD_CHANNEL="stable"
                PUBLISH_CHANNEL="stable"
              else
                BUILD_CHANNEL="prerelease"
                PUBLISH_CHANNEL="prerelease"
              fi
              ;;
            *)
              echo "Invalid channel '$GH_INPUT_CHANNEL'." >&2
              exit 1
              ;;
          esac
        fi

        echo "build_channel=${BUILD_CHANNEL}" >> "$GITHUB_OUTPUT"
        echo "publish_channel=${PUBLISH_CHANNEL}" >> "$GITHUB_OUTPUT"
        echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
        echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
        echo "is_publish_event=${IS_PUBLISH_EVENT}" >> "$GITHUB_OUTPUT"
    - name: Set up Node 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Set extension version for channel
      if: steps.release_meta.outputs.is_publish_event == 'true'
      shell: bash
      run: |
        npm version "${{ steps.release_meta.outputs.tag_version }}" --no-git-tag-version

        echo "Extension version for this build: $(node -p "require('./package.json').version")"
    - name: Install yarn
      run: npm install -g yarn
    - name: Install dependencies
      run: yarn install --frozen-lockfile
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Validate schema files
      run: npm run test:schema
    - name: Run grammar tests
      run: npm run test:grammar
    - name: Run debugger parity tests
      run: npm run test:parity
    - name: Run extension-host tests
      run: xvfb-run -a npm run test:extension
    - name: Build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MANUAL_LS_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
      run: |
        PREPARE_ARGS=("${{ matrix.file }}" "--channel" "${{ steps.release_meta.outputs.build_channel }}")
        PACKAGE_ARGS=("-o" "vscode-gmod-ls-${{ matrix.target }}.vsix" "--target" "${{ matrix.target }}")

        if [[ -n "${MANUAL_LS_VERSION}" ]]; then
          PREPARE_ARGS+=("--ls-version" "${MANUAL_LS_VERSION}")
        fi

        if [[ "${{ steps.release_meta.outputs.publish_channel }}" == "prerelease" ]]; then
          PACKAGE_ARGS+=("--pre-release")
        fi

        node ./build/prepare.js "${PREPARE_ARGS[@]}"
        npx @vscode/vsce package "${PACKAGE_ARGS[@]}"
    - name: Verify bundled language server
      run: |
        node ./build/verify-vsix.js "vscode-gmod-ls-${{ matrix.target }}.vsix" "${{ matrix.target }}"
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: vscode-gmod-ls-${{ matrix.target }}
        path: ${{ github.workspace }}/vscode-gmod-ls*.vsix

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    if: needs.build.outputs.is_publish_event == 'true'
    permissions:
      contents: write
    steps:
      - name: Preflight publish secrets
        shell: bash
        env:
          VSCE_ACCESS_TOKEN: ${{ secrets.VSCE_ACCESS_TOKEN }}
          PUBLISH_CHANNEL: ${{ needs.build.outputs.publish_channel }}
        run: |
          set -euo pipefail
          if [[ -z "${VSCE_ACCESS_TOKEN}" ]]; then
            echo "::error::VSCE_ACCESS_TOKEN is required to publish ${PUBLISH_CHANNEL} extension releases."
            exit 1
          fi

      - name: Ensure GitHub release exists for tag
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.build.outputs.tag_name }}
          PUBLISH_CHANNEL: ${{ needs.build.outputs.publish_channel }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;
            const prerelease = process.env.PUBLISH_CHANNEL === 'prerelease';

            const macosWarning = [
              '## macOS support is experimental',
              '',
              'macOS VSIX packages bundle experimental darwin-x64 and darwin-arm64 language server builds. Debugger support on macOS is also experimental and may require extra validation before regular use.',
            ].join('\n');
            const appendMacosWarning = (body = '') => {
              if (body.includes('## macOS support is experimental')) {
                return body;
              }
              return [body.trim(), macosWarning].filter(Boolean).join('\n\n');
            };

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: tag,
                body: appendMacosWarning(existing.data.body ?? ''),
                prerelease,
                draft: false,
              });
              core.info(`Updated release ${tag} (prerelease=${prerelease}).`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body: macosWarning,
                prerelease,
                draft: false,
              });
              core.info(`Created release ${tag} (prerelease=${prerelease}).`);
            }
      - uses: actions/download-artifact@v4
      - name: Upload VSIX artifacts to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.build.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mapfile -t PACKAGE_PATHS < <(find vscode-gmod-ls* -iname "*.vsix" -type f)

          if [[ "${#PACKAGE_PATHS[@]}" -eq 0 ]]; then
            echo "No VSIX package found to upload."
            exit 1
          fi

          gh release upload "$TAG_NAME" --repo "$REPOSITORY" "${PACKAGE_PATHS[@]}" --clobber
      - name: Publish to VS Code Marketplace
        shell: bash
        run: |
          mapfile -t PACKAGE_PATHS < <(find vscode-gmod-ls* -iname "*.vsix" -type f)

          if [[ "${#PACKAGE_PATHS[@]}" -eq 0 ]]; then
            echo "No VSIX package found to publish."
            exit 1
          fi

          for package_path in "${PACKAGE_PATHS[@]}"; do
            if [[ "${{ needs.build.outputs.publish_channel }}" == "prerelease" ]]; then
              npx @vscode/vsce publish --pre-release --packagePath "${package_path}"
            else
              npx @vscode/vsce publish --packagePath "${package_path}"
            fi
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_ACCESS_TOKEN }}
