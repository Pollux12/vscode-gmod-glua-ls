name: Build

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - { target: win32-x64,  file: emmylua_ls-win32-x64.zip }
          - { target: linux-x64,  file: emmylua_ls-linux-x64-glibc.2.17.tar.gz }

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Node 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: yarn install --frozen-lockfile
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Build
      run: |
        node ./build/prepare.js ${{ matrix.file }}
        npx vsce package -o vscode-gmod-ls-${{ matrix.target }}.vsix --target ${{ matrix.target }}
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: vscode-gmod-ls-${{ matrix.target }}
        path: ${{ github.workspace }}/vscode-gmod-ls*.vsix

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    if: success() && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - run: npx vsce publish --packagePath $(find vscode-gmod-ls* -iname "*.vsix")
        env:
          VSCE_PAT: ${{ secrets.VSCE_ACCESS_TOKEN }}
