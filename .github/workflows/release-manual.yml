name: Manual Release Tag

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable
      version:
        description: Optional explicit version (x.y.z). Leave blank to auto-increment.
        required: false
        type: string
      language_server_version:
        description: Optional LS release version to pin in build/config.json (e.g. 1.1.0)
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Compute version and tag
        id: meta
        shell: bash
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Explicit version must be x.y.z." >&2
              exit 1
            fi
          else
            mapfile -t versions < <(
              git tag --list \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V || true
            )

            if [[ "${#versions[@]}" -eq 0 ]]; then
              if [[ "${INPUT_CHANNEL}" == "stable" ]]; then
                version="1.1.0"
              else
                version="1.0.1"
              fi
            else
              latest="${versions[${#versions[@]}-1]}"
              IFS='.' read -r major minor patch <<< "$latest"

              if [[ "${INPUT_CHANNEL}" == "stable" ]]; then
                version="${major}.$((minor + 1)).0"
              else
                if (( patch == 0 )); then
                  version="${major}.${minor}.1"
                else
                  version="${major}.${minor}.$((patch + 1))"
                fi
              fi
            fi
          fi

          tag="${version}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag '${tag}' already exists on origin." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Optionally pin language server version
        if: inputs.language_server_version != ''
        shell: bash
        env:
          LS_VERSION_RAW: ${{ inputs.language_server_version }}
          TARGET_BRANCH: ${{ github.ref_name }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          ls_version="${LS_VERSION_RAW}"
          if ! [[ "${ls_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "language_server_version must be x.y.z." >&2
            exit 1
          fi

          LS_VERSION="${ls_version}" node -e "const fs=require('fs');const p='build/config.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));if(c.newLanguageServerVersion!==process.env.LS_VERSION){c.newLanguageServerVersion=process.env.LS_VERSION;fs.writeFileSync(p,JSON.stringify(c,null,4)+'\n');}"

          if ! git diff --quiet -- build/config.json; then
            git add build/config.json
            git commit -m "chore(release): pin LS ${ls_version} for ${RELEASE_TAG}"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Create and push tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail

          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG} (${RELEASE_CHANNEL})"
          git push origin "${RELEASE_TAG}"

      - name: Dispatch build workflow for new tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build.yml",
              ref: "${{ steps.meta.outputs.tag }}",
            });

      - name: Summary
        run: |
          echo "Created tag: ${{ steps.meta.outputs.tag }}"
          echo "Dispatched build.yml for ref: ${{ steps.meta.outputs.tag }}"
