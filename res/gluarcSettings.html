<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; style-src {{cspSource}} 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}';"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Garry's Mod Language Server</title>
        <style nonce="{{nonce}}">
            :root {
                --container-padding: 32px 48px;
                --sidebar-width: 250px;
                --section-content-inset: 24px;
            }

            body {
                background-color: var(--vscode-settings-editorBackground, var(--vscode-editor-background));
                color: var(--vscode-editor-foreground);
                font-family: var(--vscode-font-family);
                font-size: var(--vscode-font-size, 13px);
                margin: 0;
                padding: 0;
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            /* Sidebar */
            .sidebar {
                width: var(--sidebar-width);
                background-color: var(--vscode-settings-editorBackground, var(--vscode-editor-background));
                color: var(--vscode-foreground);
                border-right: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                overflow-y: auto;
                flex-shrink: 0;
                padding-top: 28px;
                display: flex;
                flex-direction: column;
            }

            .sidebar-header {
                padding: 0 28px 12px;
                font-weight: 600;
                text-transform: uppercase;
                font-size: 11px;
                letter-spacing: 0.05em;
                color: var(--vscode-sideBarTitle-foreground, var(--vscode-foreground));
                opacity: 0.7;
            }

            .category-list {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            .category-item {
                margin: 2px 16px;
                padding: 6px 12px;
                border-radius: 5px;
                cursor: pointer;
                user-select: none;
                font-size: 13px;
                color: var(--vscode-foreground);
                transition: background-color 0.1s, color 0.1s;
                display: flex;
                align-items: center;
            }

            .category-item:hover {
                background-color: var(--vscode-list-hoverBackground);
                color: var(--vscode-list-hoverForeground);
            }

            .category-item.active {
                background-color: var(--vscode-list-activeSelectionBackground);
                color: var(--vscode-list-activeSelectionForeground);
                font-weight: 500;
            }

            /* Content Area */
            .content {
                flex-grow: 1;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                background-color: var(--vscode-settings-editorBackground, var(--vscode-editor-background));
            }

            .header {
                padding: 24px 48px 16px;
                background-color: var(--vscode-settings-editorBackground, var(--vscode-editor-background));
                flex-shrink: 0;
                border-bottom: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                display: flex;
                flex-direction: column;
                gap: 20px;
                z-index: 10;
            }

            .header-top {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .header-title {
                margin: 0;
                font-size: 22px;
                font-weight: 400;
                letter-spacing: 0;
                color: var(--vscode-settings-headerForeground, var(--vscode-foreground));
            }

            .search-container {
                display: flex;
                flex-direction: column;
                gap: 6px;
                width: 100%;
                max-width: 640px;
            }

            .search-wrapper {
                position: relative;
                width: 100%;
            }

            .search-input {
                width: 100%;
                padding: 8px 28px 8px 12px;
                border-radius: 2px;
                background-color: var(--vscode-settings-textInputBackground, var(--vscode-input-background));
                color: var(--vscode-settings-textInputForeground, var(--vscode-input-foreground));
                border: 1px solid var(--vscode-settings-textInputBorder, var(--vscode-input-border));
                font-size: 14px;
                font-family: inherit;
                transition: border-color 0.1s, outline 0.1s;
            }

            .search-input:focus {
                outline: 1px solid var(--vscode-focusBorder);
                outline-offset: -1px;
                border-color: var(--vscode-focusBorder);
            }

            .search-clear {
                position: absolute;
                right: 8px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                width: 18px;
                height: 18px;
                line-height: 18px;
                text-align: center;
                border-radius: 3px;
                font-size: 14px;
                color: var(--vscode-input-placeholderForeground);
                display: none;
                transition: color 0.1s, background-color 0.1s;
            }

            .search-clear:hover {
                color: var(--vscode-input-foreground);
                background-color: var(--vscode-list-hoverBackground);
            }

            .search-results-info {
                font-size: 12px;
                color: var(--vscode-descriptionForeground);
                height: 16px;
                line-height: 16px;
                margin-left: 2px;
            }

            .reload-server-btn {
                background-color: transparent;
                color: var(--vscode-button-secondaryForeground, var(--vscode-foreground));
                border: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-radius: 4px;
                min-height: 28px;
                padding: 4px 12px;
                cursor: pointer;
                font-weight: 500;
                font-size: 13px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                transition: all 0.2s;
            }

            .reload-server-btn:hover {
                background-color: var(--vscode-toolbar-hoverBackground, var(--vscode-list-hoverBackground));
                color: var(--vscode-button-secondaryForeground, var(--vscode-foreground));
            }

            .reload-server-btn:focus-visible {
                outline: 1px solid var(--vscode-focusBorder);
                outline-offset: 2px;
            }

            .settings-body {
                flex-grow: 1;
                overflow-y: auto;
                scroll-behavior: smooth;
                padding: var(--container-padding);
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }

            .settings-container {
                max-width: 1200px;
                width: 100%;
            }

            .no-results-state {
                display: none;
                min-height: 180px;
                align-items: center;
                justify-content: center;
                text-align: center;
                color: var(--vscode-descriptionForeground);
                font-size: 14px;
                border: 1px dashed var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-radius: 8px;
                margin-top: 16px;
            }

            .workspace-config-banner {
                margin-bottom: 32px;
                padding: 14px 20px;
                font-size: 13px;
                line-height: 1.5;
                color: var(--vscode-descriptionForeground);
                background-color: var(--vscode-textBlockQuote-background);
                border-radius: 4px;
                border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border));
                border-left: 4px solid var(--vscode-textBlockQuote-border, var(--vscode-focusBorder));
            }

            .workspace-config-banner strong {
                display: block;
                margin-bottom: 4px;
                color: var(--vscode-foreground);
                font-size: 14px;
                font-weight: 500;
            }

            mark {
                background-color: var(
                    --vscode-editor-findMatchHighlightBackground
                );
                color: inherit;
                border-radius: 2px;
            }

            h2 {
                margin: 0;
                padding: 0;
                border: none;
                color: var(--vscode-settings-headerForeground, var(--vscode-foreground));
                font-size: 20px;
                font-weight: 500;
                letter-spacing: 0;
            }

            section {
                margin-bottom: 56px;
                scroll-margin-top: 32px;
                width: 100%;
            }

            .section-heading {
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 0;
                padding: 18px var(--section-content-inset) 16px;
                background-color: var(--vscode-textBlockQuote-background);
                border: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-bottom: 0;
                border-radius: 8px 8px 0 0;
            }

            .section-description {
                margin: 0;
                color: var(--vscode-descriptionForeground);
                font-size: 13px;
                line-height: 1.6;
                max-width: 800px;
            }

            .section-body {
                background-color: var(--vscode-editorWidget-background, var(--vscode-editor-background));
                border: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-radius: 8px;
                box-shadow: 0 4px 12px -2px var(--vscode-widget-shadow);
                overflow: hidden;
            }

            .section-heading + .section-body {
                border-top: 0;
                border-radius: 0 0 8px 8px;
            }

            /* Settings Rows */
            .setting-row {
                padding: 20px var(--section-content-inset);
                display: grid;
                gap: 16px;
                border-bottom: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                margin-bottom: 0;
                transition: background-color 0.15s linear;
                opacity: 1;
            }

            .setting-row.is-filtered-out {
                display: none;
            }

            .setting-row:last-child {
                border-bottom: none;
            }

            .setting-row-inline {
                grid-template-columns: minmax(0, 1fr) 320px;
                align-items: start;
                column-gap: 48px;
            }

            .setting-row-stacked {
                grid-template-columns: minmax(0, 1fr);
            }

            .setting-row:hover {
                background-color: var(--vscode-list-hoverBackground);
            }

            .setting-text {
                min-width: 0;
            }

            .setting-label {
                font-weight: 500;
                font-size: 14px;
                color: var(--vscode-settings-headerForeground, var(--vscode-foreground));
                margin: 0;
                display: block;
            }

            .setting-label-row {
                display: block;
            }

            .setting-input-container {
                width: 100%;
                min-width: 0;
                display: flex;
                flex-direction: column;
            }

            .setting-row-inline .setting-input-container {
                width: 100%;
                max-width: 100%;
                justify-self: stretch;
                margin-top: 2px;
            }

            .setting-description {
                font-size: 13px;
                color: var(--vscode-descriptionForeground);
                margin-top: 8px;
                margin-bottom: 0;
                line-height: 1.5;
            }

            .setting-key-hint {
                font-size: 12px;
                color: var(--vscode-textLink-foreground);
                margin-top: 8px;
                opacity: 0.9;
                font-family: var(--vscode-editor-font-family, monospace);
            }

            .formatter-note {
                margin: 20px var(--section-content-inset) 0 var(--section-content-inset);
                padding: 12px 16px;
                border-left: 4px solid var(--vscode-textBlockQuote-border, var(--vscode-focusBorder));
                background-color: var(--vscode-textBlockQuote-background);
                color: var(--vscode-descriptionForeground);
                border-radius: 4px;
                border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border));
                font-size: 13px;
            }

            .formatter-note-hidden {
                display: none;
            }

            .formatter-group {
                background-color: transparent;
                border-bottom: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                overflow: hidden;
            }

            .formatter-group:last-child {
                border-bottom: none;
            }

            .formatter-group summary {
                margin: 0;
                padding: 20px var(--section-content-inset);
                font-size: 14px;
                font-weight: 600;
                color: var(--vscode-settings-headerForeground, var(--vscode-foreground));
                background-color: transparent;
                user-select: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                transition: background-color 0.2s;
                border-bottom: 1px solid transparent;
            }

            .formatter-group summary::-webkit-details-marker {
                display: none;
            }

            .formatter-group summary::marker {
                content: "";
            }

            .formatter-group summary::before {
                content: "";
                width: 8px;
                height: 8px;
                margin-right: 12px;
                border-right: 1.5px solid currentColor;
                border-bottom: 1.5px solid currentColor;
                transform: rotate(-45deg);
                transition: transform 0.15s ease;
                flex-shrink: 0;
                opacity: 0.85;
            }

            .formatter-group summary:hover {
                background-color: var(--vscode-list-hoverBackground);
            }

            .formatter-group[open] summary {
                background-color: var(--vscode-list-hoverBackground, transparent);
                border-bottom: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
            }

            .formatter-group[open] summary::before {
                transform: rotate(45deg);
            }

            .formatter-group-content {
                background-color: transparent;
            }

        /* Format Layout & Preview */
        .format-layout {
            display: block;
        }

        .format-settings-column {
            width: 100%;
        }

        .setting-label-row-with-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .format-preview-toggle {
            padding: 2px 10px;
            border: 1px solid var(--vscode-button-border, var(--vscode-panel-border));
            border-radius: 999px;
            background-color: transparent;
            color: var(--vscode-textLink-foreground, var(--vscode-foreground));
            font-size: 0.8em;
            font-weight: 500;
            line-height: 1.4;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .format-preview-toggle:hover {
            background-color: var(--vscode-toolbar-hoverBackground, var(--vscode-list-hoverBackground));
        }

        .format-preview-toggle[aria-expanded="true"] {
            background-color: var(--vscode-button-secondaryBackground, var(--vscode-list-activeSelectionBackground));
            color: var(--vscode-button-secondaryForeground, var(--vscode-foreground));
        }

        .format-inline-preview {
            grid-column: 1 / -1;
            display: none;
            margin-top: 8px;
        }

        .format-inline-preview.is-open {
            display: block;
        }

        .format-inline-preview-panel {
            width: 100%;
            border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border));
            border-radius: 6px;
            background-color: var(--vscode-editor-background);
            box-shadow: 0 4px 12px var(--vscode-widget-shadow);
            overflow: hidden;
        }

        .format-inline-preview-header {
            padding: 10px 16px;
            background-color: var(--vscode-editorWidget-background, var(--vscode-sideBar-background));
            border-bottom: 1px solid var(--vscode-widget-border, var(--vscode-panel-border));
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--vscode-foreground);
            opacity: 0.7;
        }

        .format-inline-preview-content {
            padding: 16px;
            font-family: var(--vscode-editor-font-family, monospace);
            font-size: var(--vscode-editor-font-size, 13px);
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: anywhere;
            color: var(--vscode-editor-foreground);
            background-color: var(--vscode-editor-background);
            overflow-x: auto;
            border-radius: 0 0 6px 6px;
        }

            /* Syntax Highlighting (highlight.js theme mapped to VS Code colors) */
            .hljs-keyword { color: var(--vscode-symbolIcon-keywordForeground, #569cd6); }
            .hljs-built_in { color: var(--vscode-symbolIcon-functionForeground, #dcdcaa); }
            .hljs-title { color: var(--vscode-symbolIcon-functionForeground, #dcdcaa); }
            .hljs-string { color: var(--vscode-debugTokenExpression-string, #ce9178); }
            .hljs-number { color: var(--vscode-debugTokenExpression-number, #b5cea8); }
            .hljs-comment { color: var(--vscode-descriptionForeground, #6a9955); font-style: italic; }
            .hljs-literal { color: var(--vscode-symbolIcon-keywordForeground, #569cd6); }
            .hljs-params { color: var(--vscode-symbolIcon-variableForeground, #9cdcfe); }
            .syntax-header { color: var(--vscode-editorInfo-foreground, #3794ff); font-weight: bold; }

            /* Line Spacing Inputs */
            .line-spacing-wrapper {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .line-spacing-number {
                width: 80px;
            }

            /* Inputs */
            input[type="text"],
            input[type="number"],
            select,
            textarea {
                background-color: var(--vscode-settings-textInputBackground, var(--vscode-input-background));
                color: var(--vscode-settings-textInputForeground, var(--vscode-input-foreground));
                border: 1px solid var(--vscode-settings-textInputBorder, var(--vscode-input-border));
                border-radius: 2px;
                padding: 6px 12px;
                min-height: 28px;
                font-family: inherit;
                width: 100%;
                box-sizing: border-box;
                font-size: 13px;
                line-height: 1.4;
                transition: border-color 0.2s, outline 0.2s;
            }

            select {
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                padding-right: 36px;
                background-image:
                    linear-gradient(45deg, transparent 50%, var(--vscode-input-foreground) 50%),
                    linear-gradient(135deg, var(--vscode-input-foreground) 50%, transparent 50%);
                background-position:
                    calc(100% - 18px) calc(50% - 1px),
                    calc(100% - 13px) calc(50% - 1px);
                background-size: 5px 5px, 5px 5px;
                background-repeat: no-repeat;
            }

            select::-ms-expand {
                display: none;
            }

            input[type="text"]:focus,
            input[type="number"]:focus,
            select:focus,
            textarea:focus {
                outline: 1px solid var(--vscode-focusBorder);
                outline-offset: -1px;
                border-color: var(--vscode-focusBorder);
            }

            ::placeholder {
                color: var(--vscode-input-placeholderForeground);
            }

            .input-validation-message {
                margin-top: 6px;
                font-size: 12px;
                color: var(
                    --vscode-inputValidation-errorForeground,
                    var(--vscode-editorError-foreground)
                );
            }

            /* Array / Chips */
            .tags-container {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 12px;
            }

            .tag {
                background-color: var(--vscode-badge-background);
                color: var(--vscode-badge-foreground);
                padding: 4px 10px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 13px;
                border: 1px solid var(--vscode-contrastBorder, transparent);
            }

            .tag-value {
                max-width: 520px;
                word-break: break-all;
            }

            .add-tag-row {
                display: flex;
                gap: 8px;
            }

            .add-tag-row input,
            .add-tag-row select {
                flex: 1;
            }

            .add-btn,
            .delete-btn {
                background-color: var(--vscode-button-secondaryBackground, var(--vscode-input-background));
                color: var(--vscode-button-secondaryForeground, var(--vscode-editor-foreground));
                border: 1px solid var(--vscode-contrastBorder, var(--vscode-button-border, var(--vscode-panel-border)));
                border-radius: 4px;
                min-height: 28px;
                padding: 6px 16px;
                font-size: 13px;
                cursor: pointer;
                white-space: nowrap;
                transition: background-color 0.2s;
            }

            .add-btn:hover,
            .delete-btn:hover {
                background-color: var(--vscode-button-secondaryHoverBackground, var(--vscode-list-hoverBackground));
            }

            .remove-btn {
                width: 20px;
                height: 20px;
                border: none;
                border-radius: 4px;
                background-color: transparent;
                color: var(--vscode-editor-foreground);
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                line-height: 1;
                font-size: 16px;
                opacity: 0.7;
                transition: background-color 0.1s, opacity 0.1s, color 0.1s;
            }

            .remove-btn:hover {
                background-color: var(--vscode-list-hoverBackground);
                color: var(--vscode-inputValidation-errorForeground, var(--vscode-editorError-foreground));
                opacity: 1;
            }

            .path-list-container {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .path-table {
                border: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-radius: 6px;
                overflow: hidden;
            }

            .path-row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                border-bottom: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                font-size: 13px;
                transition: background-color 0.1s;
                min-height: 32px;
            }

            .path-row:nth-child(even) {
                background-color: var(--vscode-list-hoverBackground, transparent);
            }

            .path-row:last-child {
                border-bottom: none;
            }

            .path-row:hover {
                background-color: var(--vscode-list-hoverBackground);
            }

            .path-cell {
                word-break: break-all;
                line-height: 1.3;
            }

            .path-empty {
                padding: 10px 12px;
                color: var(--vscode-descriptionForeground);
                font-style: italic;
            }

            .path-add-row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 8px;
            }

            .path-add-row input,
            .path-add-row select {
                width: 100%;
            }

            .path-add-row.is-map {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
            }

            /* Object / Array of Objects */
            .object-list-item {
                border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border));
                padding: 12px;
                margin-bottom: 12px;
                background-color: var(--vscode-editorWidget-background, var(--vscode-sideBar-background));
                border-radius: 6px;
            }

            details {
                border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border));
                padding: 12px;
                border-radius: 6px;
                background-color: var(--vscode-editorWidget-background, transparent);
            }

            summary {
                cursor: pointer;
                font-weight: 600;
                margin-bottom: 8px;
            }

            summary:focus-visible {
                color: var(--vscode-list-activeSelectionForeground);
                text-decoration: underline;
            }

            .toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background-color: var(--vscode-button-background);
                color: var(--vscode-button-foreground);
                padding: 12px 24px;
                border-radius: 4px;
                opacity: 0;
                transition: opacity 0.3s;
                pointer-events: none;
                z-index: 1000;
                box-shadow: 0 4px 12px var(--vscode-widget-shadow);
                font-weight: 500;
                font-size: 13px;
                border: 1px solid var(--vscode-contrastBorder, transparent);
            }

            .toast.show {
                opacity: 1;
            }

            /* Code block for Any/JSON */
            .json-input {

                min-height: 80px;
                border-radius: 4px;

            /* Severity table */
            .severity-table-container {
                border: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-radius: 6px;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                background-color: var(--vscode-editorWidget-background, transparent);
            }

            .severity-table-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                flex-wrap: wrap;
            }

            .severity-overrides-count {
                color: var(--vscode-descriptionForeground);
                font-size: 13px;
            }

            .severity-filter {
                max-width: 280px;
            }

            .severity-table-scroll {
                max-height: 480px;
                overflow: auto;
                border: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                border-radius: 4px;
            }

            .severity-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
            }

            .severity-table th,
            .severity-table td {
                border-bottom: 1px solid var(--vscode-settings-sashBorder, var(--vscode-panel-border));
                padding: 10px 16px;
                text-align: left;
                vertical-align: middle;
            }

            .severity-table th {
                position: sticky;
                top: 0;
                z-index: 1;
                background-color: var(--vscode-editor-background);
                color: var(--vscode-settings-headerForeground, var(--vscode-foreground));
                font-weight: 500;
            }

            .severity-table tbody tr:nth-child(even) {
                background-color: var(--vscode-list-hoverBackground, transparent);
            }

            .severity-table tbody tr:hover {
                background-color: var(--vscode-list-activeSelectionBackground);
                color: var(--vscode-list-activeSelectionForeground);
            }

            .severity-code {
                font-family: var(
                    --vscode-editor-font-family,
                    var(--vscode-font-family)
                );
            }
        </style>

            let formatAutoSwitchedToCustom = false;
            let sectionObserver;

            // --- Init ---
            window.addEventListener("message", (event) => {
                const message = event.data;
                switch (message.type) {
                    case "init":
                        currentState.categories = message.categories;
                        currentState.config = message.config;
                        renderSettings();
                        setupObservers();
                        setupSearch();
                        break;
                    case "configUpdated":
                        currentState.config = message.config;
                        updateAllWidgetValues();
                        showToast();
                        break;
                }
            });

            document
                .getElementById("reloadServerBtn")
                .addEventListener("click", reloadServer);

            function showToast() {
                const toast = document.getElementById("toast");
                toast.classList.add("show");
                setTimeout(() => toast.classList.remove("show"), 3000);
            }

            // --- Search Logic ---
            function setupSearch() {
                const input = document.getElementById("searchInput");
                const clearBtn = document.getElementById("searchClear");

                input.addEventListener("input", (e) => {
                    const query = e.target.value;
                    updateFilter(query);
                    clearBtn.style.display = query ? "block" : "none";
                });

                clearBtn.addEventListener("click", () => {
                    input.value = "";
                    updateFilter("");
                    clearBtn.style.display = "none";
                    input.focus();
                });
            }

            function updateFilter(query) {
                const cleanQuery = query.trim().toLowerCase();
                const sections = document.querySelectorAll("section");
                const items = document.querySelectorAll(".category-item");
                const info = document.getElementById("searchResultsInfo");
                const noResultsState =
                    document.getElementById("noResultsState");

                let totalMatches = 0;

                sections.forEach((section, index) => {
                    let sectionVisibleCount = 0;
                    const rows = section.querySelectorAll(".setting-row");

                    rows.forEach((row) => {
                        const labelEl = row.querySelector(".setting-label");
                        const descEl = row.querySelector(
                            ".setting-description",
                        );
                        const pathText = row.dataset.path || "";

                        // Reset (use textContent setter to safely strip any <mark> highlights)
                        if (labelEl) {
                            const raw = labelEl.textContent ?? "";
                            labelEl.textContent = raw;
                        }
                        if (descEl) {
                            const raw = descEl.textContent ?? "";
                            descEl.textContent = raw;
                        }

                        const labelText = labelEl ? labelEl.textContent : "";
                        const descText = descEl ? descEl.textContent : "";

                        const match =
                            !cleanQuery ||
                            labelText.toLowerCase().includes(cleanQuery) ||
                            descText.toLowerCase().includes(cleanQuery) ||
                            pathText.toLowerCase().includes(cleanQuery);

                        if (match) {
                            setRowVisibility(row, true);
                            sectionVisibleCount++;
                            if (cleanQuery) {
                                if (labelEl)
                                    highlightElement(labelEl, cleanQuery);
                                if (descEl)
                                    highlightElement(descEl, cleanQuery);
                            }
                        } else {
                            setRowVisibility(row, false);
                        }
                    });

                    if (sectionVisibleCount > 0) {
                        section.style.display = "block";
                        if (items[index]) items[index].style.display = "block";
                        totalMatches += sectionVisibleCount;
                    } else {
                        section.style.display = "none";
                        if (items[index]) items[index].style.display = "none";
                    }
                });

                if (cleanQuery) {
                    info.textContent =
                        totalMatches === 0
                            ? "No settings match your search"
                            : `Found ${totalMatches} matching setting${totalMatches === 1 ? "" : "s"}`;
                } else {
                    info.textContent = "";
                }

                if (noResultsState) {
                    noResultsState.style.display =
                        cleanQuery && totalMatches === 0 ? "flex" : "none";
                }
            }

            function setRowVisibility(row, visible) {
                if (row.__filterHideTimer) {
                    clearTimeout(row.__filterHideTimer);
                    row.__filterHideTimer = undefined;
                }

                if (visible) {
                    row.style.display = "";
                    requestAnimationFrame(() =>
                        row.classList.remove("is-filtered-out"),
                    );
                    return;
                }

                row.classList.add("is-filtered-out");
                row.__filterHideTimer = setTimeout(() => {
                    if (row.classList.contains("is-filtered-out")) {
                        row.style.display = "none";
                    }
                    row.__filterHideTimer = undefined;
                }, 55);
            }

            function escapeHtml(s) {
                return s
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            function highlightElement(el, query) {
                const text = el.textContent ?? "";
                const escapedText = escapeHtml(text);
                const escapedQuery = escapeHtml(query);
                const regex = new RegExp(
                    `(${escapeRegExp(escapedQuery)})`,
                    "gi",
                );
                el.innerHTML = escapedText.replace(regex, "<mark>$1</mark>");
            }

            function escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            // --- Logic: Value Access ---
            function getValue(path, defaultValue) {
                let current = currentState.config;
                for (const key of path) {
                    if (current === undefined || current === null) break;
                    current = current[key];
                }
                return current !== undefined ? current : defaultValue;
            }

            function sendChange(path, value) {
                // Optimistic update
                // (In a real app we might wait, but for settings, instant feedback is good)
                vscode.postMessage({ type: "change", path, value });
            }

            function isObjectRecord(value) {
                return (
                    value !== null &&
                    typeof value === "object" &&
                    !Array.isArray(value)
                );
            }

            function setLocalValue(path, value) {
                if (!Array.isArray(path) || path.length === 0) {
                    return;
                }

                if (!isObjectRecord(currentState.config)) {
                    currentState.config = {};
                }

                if (value === undefined || value === null) {
                    deleteLocalValue(path);
                    return;
                }

                let current = currentState.config;
                for (let i = 0; i < path.length - 1; i++) {
                    const segment = path[i];
                    const next = current[segment];
                    if (!isObjectRecord(next)) {
                        current[segment] = {};
                    }
                    current = current[segment];
                }

                current[path[path.length - 1]] = value;
            }

            function deleteLocalValue(path) {
                const prune = (target, depth) => {
                    if (!isObjectRecord(target)) {
                        return false;
                    }

                    const key = path[depth];
                    if (!(key in target)) {
                        return Object.keys(target).length === 0;
                    }

                    if (depth === path.length - 1) {
                        delete target[key];
                        return Object.keys(target).length === 0;
                    }

                    const child = target[key];
                    const childEmpty = prune(child, depth + 1);
                    if (childEmpty) {
                        delete target[key];
                    }

                    return Object.keys(target).length === 0;
                };

                prune(currentState.config, 0);
            }

            function commitLocalChange(path, value) {
                setLocalValue(path, value);
                sendChange(path, value);
            }

            function getFormatPreset() {
                const rawPreset = getValue(FORMAT_PRESET_PATH, "default");
                return FORMAT_PRESET_VALUES.includes(rawPreset)
                    ? rawPreset
                    : "default";
            }

            function getFormatConfigPrecedence() {
                const rawValue = getValue(
                    FORMAT_CONFIG_PRECEDENCE_PATH,
                    "preferEditorconfig",
                );
                return FORMAT_CONFIG_PRECEDENCE_VALUES.includes(rawValue)
                    ? rawValue
                    : "preferEditorconfig";
            }

            function getFormatFieldType(key) {
                if (FORMAT_BOOLEAN_FIELDS.has(key)) {
                    return "boolean";
                }

                if (FORMAT_INTEGER_FIELDS.has(key)) {
                    return "integer";
                }

                if (FORMAT_LINE_SPACE_FIELDS.has(key)) {
                    return "lineSpacing";
                }

                if (key === "space_before_inline_comment") {
                    return "numberOrKeep";
                }

                if (FORMAT_ENUM_FIELDS[key]) {
                    return "enum";
                }

                return "string";

            function formatFieldLabel(key) {
                return key
                    .split("_")
                    .map((token) =>

                    )
                    .join(" ");
            }

            function createFormatSettingRow(options) {
                const {
                    label,
                    path,
                    description,
                    keyHint,
                    input,
                    inline = true,
                } = options;

                const row = document.createElement("div");
                row.className = `setting-row ${inline ? "setting-row-inline" : "setting-row-stacked"}`;
                row.dataset.path = Array.isArray(path) ? path.join(".") : "";

                const textContainer = document.createElement("div");
                textContainer.className = "setting-text";

                const labelRow = document.createElement("div");
                labelRow.className = "setting-label-row";
                const hasPreview = Boolean(
                    options.settingKey && FORMAT_PREVIEWS[options.settingKey],
                );
                if (hasPreview) {
                    labelRow.classList.add("setting-label-row-with-action");
                }

                const labelEl = document.createElement("span");
                labelEl.className = "setting-label";
                labelEl.textContent = label;

                labelRow.appendChild(labelEl);

                let previewToggle = null;
                let previewContainer = null;
                if (hasPreview) {
                    previewToggle = document.createElement("button");
                    previewToggle.type = "button";
                    previewToggle.className = "format-preview-toggle";
                    previewToggle.textContent = "Preview";
                    previewToggle.setAttribute("aria-expanded", "false");
                    previewContainer = createInlineFormatPreview(options.settingKey);
                    previewToggle.setAttribute("aria-controls", previewContainer.id);
                    previewToggle.addEventListener("click", () => {
                        const nextExpanded =
                            previewToggle.getAttribute("aria-expanded") !== "true";
                        collapseInlineFormatPreviews(previewContainer, previewToggle);
                        setInlineFormatPreviewExpanded(
                            previewContainer,
                            previewToggle,
                            nextExpanded,
                        );
                    });
                    labelRow.appendChild(previewToggle);
                }

                textContainer.appendChild(labelRow);

                if (description) {
                    const descEl = document.createElement("div");
                    descEl.className = "setting-description";

                    textContainer.appendChild(descEl);

                if (keyHint) {
                    const hintEl = document.createElement("div");

                    textContainer.appendChild(hintEl);

                row.appendChild(textContainer);

                inputContainer.className = "setting-input-container";
                inputContainer.appendChild(input);
                row.appendChild(inputContainer);

                if (previewContainer) {

            function setInlineFormatPreviewExpanded(
                previewContainer,
                previewToggle,

            function collapseInlineFormatPreviews(exceptContainer, exceptToggle) {

                document
                    .querySelectorAll('.format-preview-toggle[aria-expanded="true"]')
                    .forEach((button) => {

            function renderFormatStyleInput(key, fieldValue, onChange) {
                const fieldType = getFormatFieldType(key);

                if (fieldType === "boolean") {
                    return generateInput(
                        {
                            type: "boolean",
                            nullable: true,
                        },
                        fieldValue,
                        onChange,
                    );
                }

                if (fieldType === "integer") {
                    return generateInput(
                        {
                            type: "integer",
                            nullable: true,
                        },
                        fieldValue,
                        onChange,
                    );
                }

                if (fieldType === "enum") {
                    return generateInput(
                        {
                            type: "enum",
                            nullable: true,
                            enumValues: FORMAT_ENUM_FIELDS[key],
                        },
                        fieldValue,
                        onChange,
                    );
                }

                const input = document.createElement("input");
                input.type = "text";
                input.value =
                    fieldValue !== undefined && fieldValue !== null
                        ? String(fieldValue)
                        : "";

                if (fieldType === "lineSpacing") {
                    input.placeholder = "keep | fixed(n) | min(n) | max(n)";
                } else if (fieldType === "numberOrKeep") {
                    input.placeholder = "keep or number";
                }

                const setValidationState = (message) => {
                    const hasError =
                        typeof message === "string" && message.length > 0;
                    input.style.borderColor = hasError
                        ? "var(--vscode-inputValidation-errorBorder)"
                        : "var(--vscode-input-border)";
                    input.setAttribute(
                        "aria-invalid",
                        hasError ? "true" : "false",
                    );
                    return hasError;
                };

                if (fieldType === "numberOrKeep") {
                    const wrapper = document.createElement("div");
                    const error = document.createElement("div");
                    error.className = "input-validation-message";
                    error.style.display = "none";

                    const showValidationMessage = (message) => {
                        if (setValidationState(message)) {
                            error.textContent = message;
                            error.style.display = "block";
                        } else {
                            error.textContent = "";
                            error.style.display = "none";
                        }
                    };

                    input.oninput = () => {
                        showValidationMessage("");
                    };

                    input.onchange = () => {
                        const raw = input.value.trim();
                        if (!raw) {
                            showValidationMessage("");
                            onChange(null);
                            return;
                        }

                        if (raw === "keep") {
                            showValidationMessage("");
                            onChange("keep");
                            return;
                        }

                        if (/^\d+$/.test(raw)) {
                            showValidationMessage("");
                            onChange(Number.parseInt(raw, 10));
                            return;
                        }

                        showValidationMessage(
                            'Enter an integer or the literal string "keep".',
                        );
                    };

                    wrapper.appendChild(input);
                    wrapper.appendChild(error);
                    return wrapper;
                }

                input.onchange = () => {
                    const raw = input.value.trim();
                    if (!raw) {
                        onChange(null);
                        return;
                    }

                    onChange(raw);
                };

                return input;
            }

            function applyFormatPreset(selectedPreset) {
                if (!FORMAT_PRESET_VALUES.includes(selectedPreset)) {
                    return;
                }

                if (selectedPreset === "default") {
                    commitLocalChange(FORMAT_STYLE_OVERRIDES_PATH, null);
                } else if (selectedPreset === "cfc") {
                    commitLocalChange(FORMAT_STYLE_OVERRIDES_PATH, {
                        ...FORMAT_CFC_PRESET,
                    });
                }

                commitLocalChange(FORMAT_PRESET_PATH, selectedPreset);
                formatAutoSwitchedToCustom = false;
                updateAllWidgetValues();
            }

            function applyFormatStyleOverrideChange(key, nextValue) {
                const keyPath = [...FORMAT_STYLE_OVERRIDES_PATH, key];
                const currentPreset = getFormatPreset();

                commitLocalChange(keyPath, nextValue);

                if (currentPreset !== "custom") {
                    commitLocalChange(FORMAT_PRESET_PATH, "custom");
                    formatAutoSwitchedToCustom = true;
                    updateAllWidgetValues();
                }

            // Syntax highlighting using highlight.js (loaded via external bundle)
            // Pre-processes our custom -----[ header ]-----  markers before
            // passing the remaining code to hljs for proper Lua tokenization.
            function highlightLua(code) {
                if (!code) return "";

                // Process header markers first (highlight.js doesn't know about these)
                const lines = code.split('\n');
                const processed = lines.map(line => {
                    const headerMatch = line.match(/^-----\[\s(.+?)\s\]-----$/);
                    if (headerMatch) {
                        return '<span class="syntax-header">' + escapeHtml(line) + '</span>';
                    }
                    return null;
                });

                // Highlight all non-header lines with hljs
                const codeOnly = lines.map((line, i) => processed[i] !== null ? '' : line).join('\n');
                let highlighted;
                try {
                    highlighted = hljs.highlight(codeOnly, { language: 'lua' }).value;
                } catch (e) {
                    highlighted = escapeHtml(codeOnly);
                }
                const highlightedLines = highlighted.split('\n');

                // Merge headers back in
                let hIdx = 0;
                const result = lines.map((line, i) => {
                    if (processed[i] !== null) {
                        if (highlightedLines[hIdx] === "") {
                            hIdx += 1;
                        }
                        return processed[i];
                    }

                    const highlightedLine = highlightedLines[hIdx];
                    hIdx += 1;
                    return highlightedLine !== undefined ? highlightedLine : '';
                });

                return result.join('\n');
            }
