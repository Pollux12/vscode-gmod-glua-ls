            function isDiagnosticsStateField(field) {
                return (
                    Array.isArray(field.path) &&
                    field.path.length === 2 &&
                    field.path[0] === "diagnostics" &&
                    field.path[1] === "enables"
                );
            }

            function isSeverityField(field) {
                return (
                    Array.isArray(field.path) &&
                    field.path.length >= 2 &&
                    field.path[0] === "diagnostics" &&
                    field.path[1] === "severity"
                );
            }

            function getDiagnosticDefaultEnable(code) {
                return DIAGNOSTIC_DEFAULT_ENABLE[code] !== false;
            }

            function getDiagnosticDefaultSeverity(code) {
                return DIAGNOSTIC_DEFAULT_SEVERITY[code] || "warning";
            }

            function normalizeSeverityOverrides(value) {
                if (
                    !value ||
                    typeof value !== "object" ||
                    Array.isArray(value)
                ) {
                    return {};
                }

                const normalized = {};
                for (const [key, severity] of Object.entries(value)) {
                    if (DIAGNOSTIC_SEVERITY_VALUES.includes(severity)) {
                        normalized[key] = severity;
                    }
                }
                return normalized;
            }

            function toTitleCase(value) {
                return value.charAt(0).toUpperCase() + value.slice(1);
            }

            function getFieldPathKey(field) {
                if (!field || !Array.isArray(field.path)) {
                    return "";
                }

                return field.path.join(".");
            }

            function shouldHideField(field) {
                const fieldPathKey = getFieldPathKey(field);
                return HIDDEN_SETTINGS.has(fieldPathKey);
            }

            function getFieldDescription(field) {
                const fieldPathKey = getFieldPathKey(field);
                if (
                    fieldPathKey &&
                    typeof DESCRIPTION_OVERRIDES[fieldPathKey] === "string"
                ) {
                    return DESCRIPTION_OVERRIDES[fieldPathKey];
                }

                return field.description;
            }

            function getFieldLabel(field) {
                const fieldPathKey = getFieldPathKey(field);
                if (
                    fieldPathKey &&
                    typeof LABEL_OVERRIDES[fieldPathKey] === "string"
                ) {
                    return LABEL_OVERRIDES[fieldPathKey];
                }

                return field.label;
            }

            function isSingleLineControlField(field) {
                if (isDiagnosticsStateField(field)) {
                    return false;
                }

                if (isSeverityField(field)) {
                    return false;
                }

                if (
                    field.type === "boolean" ||
                    field.type === "number" ||
                    field.type === "integer" ||
                    field.type === "string" ||
                    field.type === "enum"
                ) {
                    return true;
                }

                return false;
            }

            function getFieldTokens(field) {
                const values = [];
                if (Array.isArray(field.path)) {
                    values.push(...field.path);
                }
                if (typeof field.key === "string") {
                    values.push(field.key);
                }
                if (typeof field.label === "string") {
                    values.push(field.label);
                }

                return values.map((entry) => String(entry).toLowerCase());
            }

            function allValuesLookLikePaths(value) {
                if (!Array.isArray(value) || value.length === 0) {
                    return false;
                }

                return value.every(
                    (entry) => typeof entry === "string" && /[\\/]/.test(entry),
                );
            }

            function isPathLikeArrayField(field, value) {
                if (Array.isArray(field.path) && field.path.join('.') === 'workspace.library') {
                    return true;
                }

                if (
                    field.items &&
                    Array.isArray(field.items.enumValues) &&
                    field.items.enumValues.length > 0
                ) {
                    return false;
                }

                if (
                    field.type !== "array" ||
                    !field.items ||
                    field.items.type !== "string"
                ) {
                    return false;
                }


                const tokens = getFieldTokens(field);
                const inWorkspace =
                    Array.isArray(field.path) && field.path[0] === "workspace";
                const tokenLooksPathLike = tokens.some((token) =>
                    PATH_FIELD_KEYWORDS.some((keyword) =>
                        token.includes(keyword),
                    ),
                );

                return (
                    inWorkspace ||
                    tokenLooksPathLike ||
                    allValuesLookLikePaths(value)
                );
            }

            function renderPathArrayInput(field, value, onChange) {
                const container = document.createElement("div");
                container.className = "path-list-container";

                const table = document.createElement("div");
                table.className = "path-table";
                container.appendChild(table);

                const addRow = document.createElement("div");
                addRow.className = "path-add-row";

                const input = document.createElement("input");
                input.type = "text";
                input.placeholder = "Enter path...";
                addRow.appendChild(input);

                const addBtn = document.createElement("button");
                addBtn.className = "add-btn";
                addBtn.textContent = "+ Add";
                addRow.appendChild(addBtn);

                container.appendChild(addRow);

                let currentArr = Array.isArray(value)
                    ? [...value]
                    : Array.isArray(field.default)
                      ? [...field.default]
                      : [];

                const save = () => onChange(currentArr);

                const renderRows = () => {
                    table.innerHTML = "";

                    if (currentArr.length === 0) {
                        return;
                    }

                    currentArr.forEach((entry, index) => {
                        const row = document.createElement("div");
                        row.className = "path-row";

                        const pathCell = document.createElement("div");
                        pathCell.className = "path-cell";
                        pathCell.textContent = String(entry);
                        row.appendChild(pathCell);

                        const removeBtn = document.createElement("button");
                        removeBtn.className = "remove-btn";
                        removeBtn.textContent = "×";
                        removeBtn.type = "button";
                        removeBtn.setAttribute(
                            "aria-label",
                            `Remove path ${entry}`,
                        );
                        removeBtn.onclick = () => {
                            currentArr.splice(index, 1);
                            save();
                            renderRows();
                        };

                        row.appendChild(removeBtn);
                        table.appendChild(row);
                    });
                };

                const addPath = () => {
                    const raw = input.value.trim();
                    if (!raw) {
                        return;
                    }

                    currentArr.push(raw);
                    save();
                    renderRows();
                    input.value = "";
                    input.focus();
                };

                addBtn.onclick = addPath;
                input.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        addPath();
                    }
                });

                renderRows();
                return container;
            }

            function renderDiagnosticsStateTable(field) {
                const enablesRaw = getValue(["diagnostics", "enables"]) || [];
                const disableRaw = getValue(["diagnostics", "disable"]) || [];

                const enables = Array.isArray(enablesRaw)
                    ? enablesRaw.filter((code) => typeof code === "string")
                    : [];
                const disable = Array.isArray(disableRaw)
                    ? disableRaw.filter((code) => typeof code === "string")
                    : [];

                const validCodeSet = new Set(DIAGNOSTIC_STATE_CODES);
                const stateMap = {};

                enables.forEach((code) => {
                    if (validCodeSet.has(code)) {
                        stateMap[code] = "enable";
                    }
                });

                disable.forEach((code) => {
                    if (validCodeSet.has(code)) {
                        stateMap[code] = "disable";
                    }
                });

                const container = document.createElement("div");
                container.className = "severity-table-container";

                const toolbar = document.createElement("div");
                toolbar.className = "severity-table-toolbar";

                const overridesCount = document.createElement("div");
                overridesCount.className = "severity-overrides-count";
                toolbar.appendChild(overridesCount);

                const filterInput = document.createElement("input");
                filterInput.type = "text";
                filterInput.className = "severity-filter";
                filterInput.placeholder = "Filter codes...";
                toolbar.appendChild(filterInput);

                container.appendChild(toolbar);

                const scroll = document.createElement("div");
                scroll.className = "severity-table-scroll";

                const table = document.createElement("table");
                table.className = "severity-table";

                const thead = document.createElement("thead");
                const headerRow = document.createElement("tr");

                const codeHeader = document.createElement("th");
                codeHeader.textContent = "Diagnostic Code";
                headerRow.appendChild(codeHeader);

                const defaultHeader = document.createElement("th");
                defaultHeader.textContent = "Default";
                headerRow.appendChild(defaultHeader);

                const overrideHeader = document.createElement("th");
                overrideHeader.textContent = "Override";
                headerRow.appendChild(overrideHeader);

                thead.appendChild(headerRow);
                table.appendChild(thead);

                const tbody = document.createElement("tbody");
                table.appendChild(tbody);
                scroll.appendChild(table);
                container.appendChild(scroll);

                const updateOverridesCount = () => {
                    const count = DIAGNOSTIC_STATE_CODES.reduce((acc, code) => {
                        const state = stateMap[code];
                        return state === "enable" || state === "disable"
                            ? acc + 1
                            : acc;
                    }, 0);
                    overridesCount.textContent = `${count} overrides active`;
                };

                const commitStateToConfig = () => {
                    const nextEnables = [];
                    const nextDisable = [];

                    DIAGNOSTIC_STATE_CODES.forEach((code) => {
                        const state = stateMap[code];
                        if (state === "enable") {
                            nextEnables.push(code);
                        } else if (state === "disable") {
                            nextDisable.push(code);
                        }
                    });

                    sendChange(
                        ["diagnostics", "enables"],
                        nextEnables.length > 0 ? nextEnables : null,
                    );
                    sendChange(
                        ["diagnostics", "disable"],
                        nextDisable.length > 0 ? nextDisable : null,
                    );
                };

                const rows = [];

                DIAGNOSTIC_STATE_CODES.forEach((code) => {
                    const row = document.createElement("tr");
                    row.dataset.code = code;

                    const codeCell = document.createElement("td");
                    codeCell.className = "severity-code";
                    codeCell.textContent = code;
                    row.appendChild(codeCell);

                    const defaultCell = document.createElement("td");
                    defaultCell.textContent = getDiagnosticDefaultEnable(code)
                        ? "Enabled"
                        : "Disabled";
                    defaultCell.style.color =
                        "var(--vscode-descriptionForeground)";
                    row.appendChild(defaultCell);

                    const overrideCell = document.createElement("td");
                    const select = document.createElement("select");

                    const defaultOption = document.createElement("option");
                    defaultOption.value = "";
                    defaultOption.textContent = "Default";
                    select.appendChild(defaultOption);

                    const enableOption = document.createElement("option");
                    enableOption.value = "enable";
                    enableOption.textContent = "Force Enable";
                    select.appendChild(enableOption);

                    const disableOption = document.createElement("option");
                    disableOption.value = "disable";
                    disableOption.textContent = "Force Disable";
                    select.appendChild(disableOption);

                    const currentValue = stateMap[code];
                    select.value =
                        currentValue === "enable" || currentValue === "disable"
                            ? currentValue
                            : "";

                    select.onchange = () => {
                        const selectedValue = select.value;
                        if (
                            selectedValue === "enable" ||
                            selectedValue === "disable"
                        ) {
                            stateMap[code] = selectedValue;
                        } else {
                            delete stateMap[code];
                        }

                        updateOverridesCount();
                        commitStateToConfig();
                    };

                    overrideCell.appendChild(select);
                    row.appendChild(overrideCell);

                    tbody.appendChild(row);
                    rows.push({ row, code });
                });

                const updateRowFilter = () => {
                    const query = filterInput.value.trim().toLowerCase();
                    rows.forEach(({ row, code }) => {
                        row.style.display =
                            !query || code.toLowerCase().includes(query)
                                ? ""
                                : "none";
                    });
                };

                filterInput.addEventListener("input", updateRowFilter);

                updateOverridesCount();
                updateRowFilter();

                return container;
            }

            function renderSeverityTable(field, severityConfig) {
                const container = document.createElement("div");
                container.className = "severity-table-container";

                const toolbar = document.createElement("div");
                toolbar.className = "severity-table-toolbar";

                const overridesCount = document.createElement("div");
                overridesCount.className = "severity-overrides-count";
                toolbar.appendChild(overridesCount);

                const filterInput = document.createElement("input");
                filterInput.type = "text";
                filterInput.className = "severity-filter";
                filterInput.placeholder = "Filter codes...";
                toolbar.appendChild(filterInput);

                container.appendChild(toolbar);

                const scroll = document.createElement("div");
                scroll.className = "severity-table-scroll";

                const table = document.createElement("table");
                table.className = "severity-table";

                const thead = document.createElement("thead");
                const headerRow = document.createElement("tr");

                const codeHeader = document.createElement("th");
                codeHeader.textContent = "Diagnostic Code";
                headerRow.appendChild(codeHeader);

                const severityHeader = document.createElement("th");
                severityHeader.textContent = "Severity";
                headerRow.appendChild(severityHeader);

                thead.appendChild(headerRow);
                table.appendChild(thead);

                const tbody = document.createElement("tbody");
                table.appendChild(tbody);
                scroll.appendChild(table);
                container.appendChild(scroll);

                const localOverrides =
                    normalizeSeverityOverrides(severityConfig);

                const updateOverridesCount = () => {
                    overridesCount.textContent = `${Object.keys(localOverrides).length} overrides active`;
                };

                const rows = [];

                DIAGNOSTIC_CODES.forEach((code) => {
                    const row = document.createElement("tr");
                    row.dataset.code = code;

                    const codeCell = document.createElement("td");
                    codeCell.className = "severity-code";
                    codeCell.textContent = code;
                    row.appendChild(codeCell);

                    const selectCell = document.createElement("td");
                    const select = document.createElement("select");

                    const defaultSeverity = getDiagnosticDefaultSeverity(code);
                    const defaultOption = document.createElement("option");
                    defaultOption.value = "";
                    defaultOption.textContent = `Default (${defaultSeverity})`;
                    select.appendChild(defaultOption);

                    DIAGNOSTIC_SEVERITY_VALUES.forEach((severity) => {
                        const option = document.createElement("option");
                        option.value = severity;
                        option.textContent = toTitleCase(severity);
                        select.appendChild(option);
                    });

                    const currentValue = localOverrides[code];
                    select.value =
                        currentValue &&
                        DIAGNOSTIC_SEVERITY_VALUES.includes(currentValue)
                            ? currentValue
                            : "";

                    select.onchange = () => {
                        const selectedValue = select.value;
                        if (selectedValue) {
                            localOverrides[code] = selectedValue;
                        } else {
                            delete localOverrides[code];
                        }
                        updateOverridesCount();
                        sendChange(
                            [...field.path, code],
                            selectedValue || null,
                        );
                    };

                    selectCell.appendChild(select);
                    row.appendChild(selectCell);

                    tbody.appendChild(row);
                    rows.push({ row, code });
                });

                const updateRowFilter = () => {
                    const query = filterInput.value.trim().toLowerCase();
                    rows.forEach(({ row, code }) => {
                        row.style.display =
                            !query || code.includes(query) ? "" : "none";
                    });
                };

                filterInput.addEventListener("input", updateRowFilter);

                updateOverridesCount();
                updateRowFilter();

                return container;
            }

            // --- Rendering ---
            function renderSettings() {
                const catList = document.getElementById("categoryList");
                const sectionsContent =
                    document.getElementById("settingsSections");

                catList.innerHTML = "";
                sectionsContent.innerHTML = "";

                let visibleCategoryIndex = 0;

                currentState.categories.forEach((cat) => {
                    const isFormatCategory = cat.key === FORMAT_CATEGORY_KEY;
                    const visibleFields = Array.isArray(cat.fields)
                        ? cat.fields.filter((field) => !shouldHideField(field))
                        : [];

                    if (!isFormatCategory && visibleFields.length === 0) {
                        return;
                    }

                    const categoryId = `cat-${visibleCategoryIndex}`;

                    // Sidebar Item
                    const li = document.createElement("li");
                    li.className = "category-item";
                    li.textContent = cat.label;
                    li.dataset.target = categoryId;
                    li.onclick = () => {
                        document.getElementById(categoryId).scrollIntoView();
                        document
                            .querySelectorAll(".category-item")
                            .forEach((i) => i.classList.remove("active"));
                        li.classList.add("active");
                    };
                    catList.appendChild(li);

                    // Main Section
                    const section = document.createElement("section");
                    section.id = categoryId;

                    const sectionHeading = document.createElement("div");
                    sectionHeading.className = "section-heading";

                    const h2 = document.createElement("h2");
                    h2.textContent = cat.label;
                    sectionHeading.appendChild(h2);

                    if (cat.description) {
                        const desc = document.createElement("div");
                        desc.className = "section-description";
                        desc.textContent = cat.description;
                        sectionHeading.appendChild(desc);
                    }

                    section.appendChild(sectionHeading);

                    if (isFormatCategory) {
                        const behaviorNote = document.createElement("div");
                        behaviorNote.className = "workspace-config-banner";
                        behaviorNote.innerHTML = "<strong>Custom Overrides</strong><div>Editing any individual formatter option below will automatically switch the Preset to Custom.</div>";

                        const formatBody = renderFormatterSectionContent();
                        formatBody.insertBefore(behaviorNote, formatBody.firstChild);
                        section.appendChild(formatBody);
                    } else {
                        const sectionBody = document.createElement("div");
                        sectionBody.className = "section-body";
                        visibleFields.forEach((field) => {
                            sectionBody.appendChild(createFieldWidget(field));
                        });
                        section.appendChild(sectionBody);
                    }

                    sectionsContent.appendChild(section);
                    visibleCategoryIndex++;
                });

                // Re-apply filter if search input has value
                const searchInput = document.getElementById("searchInput");
                if (searchInput && searchInput.value) {
                    updateFilter(searchInput.value);
                }
            }

            function createFieldWidget(field) {
                if (shouldHideField(field)) {
                    return null;
                }

                const row = document.createElement("div");
                const isInlineControl = isSingleLineControlField(field);
                row.className = `setting-row ${isInlineControl ? "setting-row-inline" : "setting-row-stacked"}`;
                row.dataset.path = JSON.stringify(field.path); // For updates

                const textContainer = document.createElement("div");
                textContainer.className = "setting-text";

                const labelRow = document.createElement("div");
                labelRow.className = "setting-label-row";
                const label = document.createElement("span");
                label.className = "setting-label";
                label.textContent = getFieldLabel(field);
                labelRow.appendChild(label);
                textContainer.appendChild(labelRow);

                const fieldDescription = getFieldDescription(field);
                if (fieldDescription) {
                    const desc = document.createElement("div");
                    desc.className = "setting-description";
                    desc.textContent = fieldDescription;
                    textContainer.appendChild(desc);
                }

                if (field.path) {
                    const hintEl = document.createElement("div");
                    hintEl.className = "setting-key-hint";
                    hintEl.textContent = Array.isArray(field.path) ? field.path.join(".") : field.path;
                    textContainer.appendChild(hintEl);
                }

                row.appendChild(textContainer);

                const inputContainer = document.createElement("div");
                inputContainer.className = "setting-input-container";
                const currentValue = getValue(field.path);

                let widget;
                if (isDiagnosticsStateField(field)) {
                    widget = renderDiagnosticsStateTable(field);
                } else if (isSeverityField(field)) {
                    widget = renderSeverityTable(field, currentValue);
                } else {
                    widget = generateInput(field, currentValue, (newValue) => {
                        sendChange(field.path, newValue);
                    });
                }

                inputContainer.appendChild(widget);
                row.appendChild(inputContainer);

                return row;
            }

            function generateInput(field, value, onChange) {
                const { type, nullable, enumValues, items } = field;

                // 1. Boolean
                if (type === "boolean") {
                    const select = document.createElement("select");

                    if (nullable) {
                        const defaultOption = document.createElement("option");
                        defaultOption.value = "";
                        defaultOption.textContent = "Default (inherit)";
                        select.appendChild(defaultOption);
                    }

                    const enabledOption = document.createElement("option");
                    enabledOption.value = "true";
                    enabledOption.textContent = "Enabled";
                    select.appendChild(enabledOption);

                    const disabledOption = document.createElement("option");
                    disabledOption.value = "false";
                    disabledOption.textContent = "Disabled";
                    select.appendChild(disabledOption);

                    if (value === true) select.value = "true";
                    else if (value === false) select.value = "false";
                    else if (nullable) select.value = "";
                    else select.value = field.default === true ? "true" : "false";

                    select.onchange = () => {
                        if (select.value === "true") onChange(true);
                        else if (select.value === "false") onChange(false);
                        else onChange(null);
                    };

                    return select;
                }

                // 2. String / Enum
                if (type === "string" || type === "enum") {
                    if (enumValues && enumValues.length > 0) {
                        const select = document.createElement("select");

                        if (nullable) {
                            const def = document.createElement("option");
                            def.value = "";
                            def.textContent = "Default";
                            select.appendChild(def);
                        }

                        enumValues.forEach((v) => {
                            const opt = document.createElement("option");
                            opt.value = v;
                            opt.textContent = v;
                            select.appendChild(opt);
                        });

                        select.value =
                            value !== undefined && value !== null ? value : "";
                        select.onchange = () => {
                            const val = select.value;
                            onChange(val === "" ? null : val);
                        };
                        return select;
                    } else {
                        const input = document.createElement("input");
                        input.type = "text";
                        input.value =
                            value !== undefined && value !== null ? value : "";
                        input.placeholder =
                            field.default !== undefined ? field.default : "";

                        input.onchange = () => {
                            const val = input.value.trim();
                            onChange(val === "" ? null : val);
                        };
                        return input;
                    }
                }

                // 3. Number / Integer
                if (type === "number" || type === "integer") {
                    const input = document.createElement("input");
                    input.type = "number";
                    if (type === "integer") input.step = "1";
                    input.value =
                        value !== undefined && value !== null ? value : "";
                    input.placeholder =
                        field.default !== undefined ? field.default : "";

                    input.onchange = () => {
                        if (input.value === "") {
                            onChange(null);
                        } else {
                            const num =
                                type === "integer"
                                    ? parseInt(input.value)
                                    : parseFloat(input.value);
                            onChange(isNaN(num) ? null : num);
                        }
                    };
                    return input;
                }

                // 5. Array of Strings/Enums
                if (
                    type === "array" &&
                    items &&
                    (items.type === "string" ||
                        items.type === "enum" ||
                        items.type === "number" ||
                        items.type === "integer")
                ) {
                    if (isPathLikeArrayField(field, value)) {
                        return renderPathArrayInput(field, value, onChange);
                    }

                    const container = document.createElement("div");
                    const tagList = document.createElement("div");
                    tagList.className = "tags-container";

                    let currentArr = Array.isArray(value)
                        ? [...value]
                        : Array.isArray(field.default)
                          ? [...field.default]
                          : [];

                    const save = () => onChange(currentArr);

                    const renderTags = () => {
                        tagList.innerHTML = "";

                        if (currentArr.length === 0) {
                            return;
                        }

                        currentArr.forEach((item, idx) => {
                            const tag = document.createElement("div");
                            tag.className = "tag";

                            const text = document.createElement("span");
                            text.className = "tag-value";
                            text.textContent = String(item);
                            tag.appendChild(text);

                            const removeBtn = document.createElement("button");
                            removeBtn.className = "remove-btn";
                            removeBtn.type = "button";
                            removeBtn.textContent = "×";
                            removeBtn.setAttribute(
                                "aria-label",
                                `Remove item ${item}`,
                            );
                            removeBtn.onclick = () => {
                                currentArr.splice(idx, 1);
                                save();
                                renderTags();
                            };

                            tag.appendChild(removeBtn);
                            tagList.appendChild(tag);
                        });
                    };
                    renderTags();
                    container.appendChild(tagList);

                    // Add Row
                    const addRow = document.createElement("div");
                    addRow.className = "add-tag-row";

                    let inputEl;
                    if (items.enumValues) {
                        inputEl = document.createElement("select");
                        items.enumValues.forEach((v) => {
                            const opt = document.createElement("option");
                            opt.value = v;
                            opt.textContent = v;
                            inputEl.appendChild(opt);
                        });
                    } else {
                        inputEl = document.createElement("input");
                        inputEl.type =
                            items.type === "number" || items.type === "integer"
                                ? "number"
                                : "text";
                        inputEl.placeholder = "Add Item";
                    }

                    const addBtn = document.createElement("button");
                    addBtn.className = "add-btn";
                    addBtn.textContent = "Add";
                    addBtn.onclick = () => {
                        let val =
                            typeof inputEl.value === "string"
                                ? inputEl.value.trim()
                                : inputEl.value;
                        if (
                            items.type === "number" ||
                            items.type === "integer"
                        ) {
                            val = parseFloat(val);
                            if (isNaN(val)) return;
                        }
                        if (val !== "" && val !== null) {
                            currentArr.push(val);
                            save();
                            renderTags();
                            if (inputEl.tagName === "INPUT") inputEl.value = "";
                        }
                    };

                    addRow.appendChild(inputEl);
                    addRow.appendChild(addBtn);
                    container.appendChild(addRow);
                    return container;
                }

                // 6. Object (Nested properties)
                if (type === "object" && field.properties) {
                    const details = document.createElement("details");
                    const summary = document.createElement("summary");
                    summary.textContent = field.label || "Settings";
                    details.appendChild(summary);

                    const container = document.createElement("div");
                    container.style.marginLeft = "10px";
                    container.style.marginTop = "10px";

                    // If value is null/undefined, treat as empty object for rendering children
                    // (Though strictly config might be missing it)
                    const objValue = value || {};

                    field.properties.forEach((subField) => {
                        // For nested objects, we need to construct a "fake" onChange
                        // that updates the PARENT object
                        const subOnChange = (subVal) => {
                            const newObj = { ...objValue };
                            newObj[subField.key] = subVal;
                            onChange(newObj);
                        };

                        // We need to pass the "virtual" path or sub-value
                        // Ideally we reuse createFieldWidget but we need to intercept the onChange
                        // Let's manually build standard field style here

                        const row = document.createElement("div");
                        row.className = "setting-row";

                        const label = document.createElement("div");
                        label.className = "setting-label";
                        label.textContent = subField.label;
                        row.appendChild(label);

                        const subFieldDescription =
                            getFieldDescription(subField);
                        if (subFieldDescription) {
                            const desc = document.createElement("div");
                            desc.className = "setting-description";
                            desc.textContent = subFieldDescription;
                            row.appendChild(desc);
                        }

                        const subWidget = generateInput(
                            subField,
                            objValue[subField.key],
                            subOnChange,
                        );
                        row.appendChild(subWidget);

                        container.appendChild(row);
                    });

                    details.appendChild(container);
                    return details;
                }

                // 6.5 Object (Map / additionalProperties)
                if (type === "object" && field.additionalProperties) {
                    const container = document.createElement("div");
                    container.className = "path-list-container"; // Reuse styling

                    const table = document.createElement("div");
                    table.className = "path-table";
                    container.appendChild(table);

                    const addRow = document.createElement("div");
                    addRow.className = "path-add-row is-map";

                    const keyInput = document.createElement("input");
                    keyInput.type = "text";
                    keyInput.placeholder = "Key...";
                    addRow.appendChild(keyInput);

                    let valInput;
                    if (field.additionalProperties.enumValues) {
                        valInput = document.createElement("select");
                        field.additionalProperties.enumValues.forEach((v) => {
                            const opt = document.createElement("option");
                            opt.value = v;
                            opt.textContent = v;
                            valInput.appendChild(opt);
                        });
                    } else {
                        valInput = document.createElement("input");
                        valInput.type = "text";
                        valInput.placeholder = "Value...";
                    }
                    addRow.appendChild(valInput);

                    const addBtn = document.createElement("button");
                    addBtn.className = "add-btn";
                    addBtn.textContent = "+ Add";
                    addRow.appendChild(addBtn);

                    container.appendChild(addRow);

                    let currentObj =
                        value && typeof value === "object" ? { ...value } : {};

                    const save = () => onChange(currentObj);

                    const renderRows = () => {
                        table.innerHTML = "";
                        const keys = Object.keys(currentObj);

                        if (keys.length === 0) {
                            const empty = document.createElement("div");
                            empty.className = "path-empty";
                            empty.textContent = "No entries added";
                            table.appendChild(empty);
                            return;
                        }

                        keys.forEach((k) => {
                            const row = document.createElement("div");
                            row.className = "path-row";
                            row.style.gridTemplateColumns = "minmax(0, 1fr) minmax(0, 1fr) auto";

                            const keyCell = document.createElement("div");
                            keyCell.className = "path-cell";
                            keyCell.textContent = k;
                            row.appendChild(keyCell);

                            const valCell = document.createElement("div");
                            valCell.className = "path-cell";
                            valCell.textContent = String(currentObj[k]);
                            row.appendChild(valCell);

                            const removeBtn = document.createElement("button");
                            removeBtn.className = "remove-btn";
                            removeBtn.textContent = "×";
                            removeBtn.type = "button";
                            removeBtn.onclick = () => {
                                delete currentObj[k];
                                save();
                                renderRows();
                            };

                            row.appendChild(removeBtn);
                            table.appendChild(row);
                        });
                    };

                    const addEntry = () => {
                        const k = keyInput.value.trim();
                        const v = valInput.value;
                        if (!k || v === undefined || v === "") {
                            return;
                        }

                        currentObj[k] = v;
                        save();
                        renderRows();
                        keyInput.value = "";
                        if (valInput.tagName === "INPUT") valInput.value = "";
                        keyInput.focus();
                    };

                    addBtn.onclick = addEntry;
                    keyInput.addEventListener("keydown", (event) => {
                        if (event.key === "Enter") {
                            event.preventDefault();
                            addEntry();
                        }
                    });

                    renderRows();
                    return container;
                }

                // 7. Array of Objects (Complex)
                if (type === "array" && items && items.type === "object") {
                    const container = document.createElement("div");
                    let currentArr = Array.isArray(value) ? [...value] : [];

                    const list = document.createElement("div");

                    const renderList = () => {
                        list.innerHTML = "";
                        currentArr.forEach((item, idx) => {
                            const itemObj =
                                typeof item === "string"
                                    ? { path: item }
                                    : item;
                            const row = document.createElement("div");
                            row.className = "object-list-item";

                            // Header
                            const header = document.createElement("div");
                            header.style.display = "flex";
                            header.style.justifyContent = "space-between";
                            header.style.marginBottom = "8px";
                            header.innerHTML = `<strong>Item ${idx + 1}</strong>`;

                            const delBtn = document.createElement("button");
                            delBtn.className = "delete-btn";
                            delBtn.textContent = "Remove";
                            delBtn.onclick = () => {
                                currentArr.splice(idx, 1);
                                onChange(currentArr);
                                renderList();
                            };
                            header.appendChild(delBtn);
                            row.appendChild(header);

                            // Properties
                            if (items.properties) {
                                items.properties.forEach((subField) => {
                                    const subRow =
                                        document.createElement("div");
                                    subRow.style.marginBottom = "8px";

                                    const lbl = document.createElement("div");
                                    lbl.className = "setting-description"; // smaller font
                                    lbl.textContent = subField.label + (subField.key !== "path" ? " (Optional)" : " (Required)");
                                    subRow.appendChild(lbl);

                                    const subOnChange = (newVal) => {
                                        const newItem = { ...itemObj };
                                        newItem[subField.key] = newVal;
                                        currentArr[idx] = newItem;
                                        onChange(currentArr);
                                    };

                                    subRow.appendChild(
                                        generateInput(
                                            subField,
                                            itemObj[subField.key],
                                            subOnChange,
                                        ),
                                    );
                                    row.appendChild(subRow);
                                });
                            }

                            list.appendChild(row);
                        });
                    };

                    renderList();
                    container.appendChild(list);

                    const addBtn = document.createElement("button");
                    addBtn.className = "add-btn";
                    addBtn.textContent = "Add Item";
                    addBtn.onclick = () => {
                        currentArr.push({});
                        onChange(currentArr);
                        renderList();
                    };
                    container.appendChild(addBtn);

                    return container;
                }

                // 8. Fallback / Raw JSON
                const ta = document.createElement("textarea");
                ta.className = "json-input";
                ta.value = value ? JSON.stringify(value, null, 2) : "";
                ta.placeholder = field.default
                    ? JSON.stringify(field.default)
                    : "{}";

                ta.onchange = () => {
                    try {
                        const parsed = ta.value ? JSON.parse(ta.value) : null;
                        onChange(parsed);
                        ta.style.borderColor = "var(--vscode-input-border)";
                    } catch (e) {
                        ta.style.borderColor =
                            "var(--vscode-inputValidation-errorBorder)";
                    }
                };
                return ta;
            }

            // --- Updates ---
            function updateAllWidgetValues() {
                renderSettings();
                setupObservers();
            }

            // --- Sidebar highlighting ---
            function setupObservers() {
                if (sectionObserver) {
                    sectionObserver.disconnect();
                }

                sectionObserver = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                const id = entry.target.id;
                                document
                                    .querySelectorAll(".category-item")
                                    .forEach((item) => {
                                        if (item.dataset.target === id)
                                            item.classList.add("active");
                                        else item.classList.remove("active");
                                    });
                            }
                        });
                    },
                    { threshold: 0.2 },
                );

                document.querySelectorAll("section").forEach((section) => {
                    sectionObserver.observe(section);
                });
            }
        </script>
    </body>
</html>
