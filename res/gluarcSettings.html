<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'none'; style-src {{cspSource}} 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLua Settings</title>
    <style nonce="{{nonce}}">
        :root {
            --container-padding: 20px;
            --sidebar-width: 220px;
        }

        body {
            background-color: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--vscode-sideBar-background);
            color: var(--vscode-sideBar-foreground);
            border-right: 1px solid var(--vscode-sideBar-border);
            overflow-y: auto;
            flex-shrink: 0;
            padding-top: 12px;
        }

        .sidebar-header {
            padding: 0 20px 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8em;
            opacity: 0.7;
        }

        .category-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .category-item {
            padding: 10px 16px;
            cursor: pointer;
            user-select: none;
            border-left: 2px solid transparent;
            transition: background-color 0.12s ease, color 0.12s ease, border-left-color 0.12s ease;
        }

        .category-item:hover {
            background-color: var(--vscode-list-hoverBackground);
        }

        .category-item.active {
            background-color: var(--vscode-list-activeSelectionBackground);
            color: var(--vscode-list-activeSelectionForeground);
            border-left-color: var(--vscode-activityBarBadge-background, var(--vscode-focusBorder));
        }

        /* Content Area */
        .content {
            flex-grow: 1;
            /* padding: var(--container-padding); removed, moved to .settings-body */
            overflow: hidden; /* Changed from overflow-y: auto to allow flex column layout */
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 20px 10px 20px;
            background-color: var(--vscode-editor-background);
            flex-shrink: 0;
            border-bottom: 1px solid var(--vscode-panel-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 6px 30px 6px 8px;
            border-radius: 3px;
        }

        .search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            border-radius: 50%;
            font-size: 12px;
            background: var(--vscode-icon-foreground);
            color: var(--vscode-input-background);
            display: none;
        }

        .search-clear:hover {
            opacity: 0.8;
        }

        .search-results-info {
            font-size: 0.9em;
            color: var(--vscode-descriptionForeground);
            height: 1.2em; /* fixed height to avoid layout jump */
        }

        .settings-body {
            flex-grow: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: var(--container-padding);
        }

        .no-results-state {
            display: none;
            min-height: 180px;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--vscode-descriptionForeground);
            font-size: 0.95em;
            border: 1px dashed var(--vscode-panel-border);
            border-radius: 4px;
            margin-top: 16px;
        }

        .workspace-config-banner {
            margin-bottom: 20px;
            padding: 10px 12px;
            font-size: 0.9em;
            color: var(--vscode-descriptionForeground);
            background-color: var(--vscode-editorInfo-background, var(--vscode-textBlockQuote-background, var(--vscode-editor-selectionHighlightBackground)));
            border-left: 3px solid var(--vscode-notificationsInfoIcon-foreground, var(--vscode-editorInfo-foreground));
            border-radius: 2px;
        }

        .workspace-config-banner strong {
            display: block;
            margin-bottom: 4px;
            color: var(--vscode-editor-foreground);
        }

        mark {
            background-color: var(--vscode-editor-findMatchHighlightBackground);
            color: inherit;
            border-radius: 2px;
        }

        h2 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--vscode-settings-headerForeground);
            color: var(--vscode-settings-headerForeground);
            font-size: 1.5em;
        }

        section {
            margin-bottom: 40px;
            scroll-margin-top: 20px;
        }

        .section-description {
            margin-bottom: 20px;
            color: var(--vscode-descriptionForeground);
        }

        /* Settings Rows */
        .setting-row {
            padding: 12px 16px;
            display: grid;
            gap: 8px;
            border-bottom: 1px solid var(--vscode-panel-border);
            opacity: 1;
            transition: opacity 0.05s linear;
        }

        .setting-row.is-filtered-out {
            opacity: 0;
        }

        .setting-row-inline {
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            column-gap: 16px;
        }

        .setting-row-stacked {
            grid-template-columns: minmax(0, 1fr);
        }

        .setting-row:hover {
            background-color: var(--vscode-settings-rowHoverBackground);
        }

        .setting-text {
            min-width: 0;
        }

        .setting-label {
            font-weight: 500;
            margin: 0;
        }

        .setting-label-row {
            display: block;
        }

        .setting-input-container {
            width: 100%;
            min-width: 0;
        }

        .setting-row-inline .setting-input-container {
            width: auto;
            min-width: 180px;
            max-width: 260px;
            justify-self: end;
        }

        .setting-description {
            font-size: 0.9em;
            color: var(--vscode-descriptionForeground);
            margin-top: 3px;
            margin-bottom: 0;
        }

        /* Inputs */
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 3px;
            padding: 4px 8px;
            min-height: 24px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: 1px solid var(--vscode-focusBorder);
            outline-offset: 1px;
            border-color: var(--vscode-focusBorder);
        }

        ::placeholder {
            color: var(--vscode-input-placeholderForeground);
        }

        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-switch {
            position: relative;
            display: inline-flex;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            cursor: pointer;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background-color: var(--vscode-input-border);
            transition: background-color 0.12s ease;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background-color: var(--vscode-editor-background);
            transition: transform 0.12s ease;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--vscode-button-background);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(16px);
        }

        .toggle-switch input:focus-visible + .toggle-slider {
            outline: 1px solid var(--vscode-focusBorder);
            outline-offset: 1px;
        }

        /* Array / Chips */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tag {
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            padding: 2px 8px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9em;
        }

        .tag-value {
            max-width: 520px;
            word-break: break-all;
        }

        .add-tag-row {
            display: flex;
            gap: 8px;
        }

        .add-tag-row input,
        .add-tag-row select {
            flex: 1;
        }

        .add-btn,
        .delete-btn {
            background-color: var(--vscode-button-secondaryBackground, var(--vscode-input-border));
            color: var(--vscode-button-secondaryForeground, var(--vscode-editor-foreground));
            border: 1px solid var(--vscode-panel-border);
            border-radius: 3px;
            min-height: 24px;
            padding: 2px 10px;
            cursor: pointer;
            white-space: nowrap;
        }

        .add-btn:hover,
        .delete-btn:hover {
            background-color: var(--vscode-toolbar-hoverBackground, var(--vscode-list-hoverBackground));
        }

        .remove-btn {
            width: 18px;
            height: 18px;
            border: 1px solid var(--vscode-panel-border);
            border-radius: 4px;
            background-color: transparent;
            color: var(--vscode-editor-foreground);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .remove-btn:hover {
            border-color: var(--vscode-inputValidation-errorBorder);
            background-color: var(--vscode-inputValidation-errorBackground, var(--vscode-list-hoverBackground));
            color: var(--vscode-inputValidation-errorForeground, var(--vscode-editor-foreground));
        }

        .path-list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .path-table {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 4px;
            overflow: hidden;
        }

        .path-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-bottom: 1px solid var(--vscode-panel-border);
        }

        .path-row:nth-child(even) {
            background-color: var(--vscode-sideBar-background);
        }

        .path-row:last-child {
            border-bottom: none;
        }

        .path-row:hover {
            background-color: var(--vscode-list-hoverBackground);
        }

        .path-cell {
            word-break: break-all;
            line-height: 1.3;
        }

        .path-empty {
            padding: 10px 8px;
            color: var(--vscode-descriptionForeground);
            font-style: italic;
        }

        .path-add-row {
            display: flex;
            gap: 8px;
        }

        .path-add-row input {
            flex: 1;
        }

        /* Object / Array of Objects */
        .object-list-item {
            border: 1px solid var(--vscode-widget-border);
            padding: 8px;
            margin-bottom: 8px;
            background-color: var(--vscode-editorWidget-background, var(--vscode-sideBar-background));
        }

        details {
            border: 1px solid var(--vscode-widget-border);
            padding: 8px;
        }
        
        summary {
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            padding: 10px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }

        /* Code block for Any/JSON */
        .json-input {
            font-family: monospace;
            min-height: 80px;
        }

        /* Severity table */
        .severity-table-container {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 4px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .severity-table-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .severity-overrides-count {
            color: var(--vscode-descriptionForeground);
            font-size: 0.9em;
        }

        .severity-filter {
            max-width: 260px;
        }

        .severity-table-scroll {
            max-height: 420px;
            overflow: auto;
            border: 1px solid var(--vscode-panel-border);
            border-radius: 4px;
        }

        .severity-table {
            width: 100%;
            border-collapse: collapse;
        }

        .severity-table th,
        .severity-table td {
            border-bottom: 1px solid var(--vscode-panel-border);
            padding: 8px;
            text-align: left;
            vertical-align: middle;
        }

        .severity-table th {
            position: sticky;
            top: 0;
            z-index: 1;
            background-color: var(--vscode-editor-background);
            color: var(--vscode-settings-headerForeground);
        }

        .severity-table tbody tr:nth-child(even) {
            background-color: var(--vscode-sideBar-background);
        }

        .severity-table tbody tr:hover {
            background-color: var(--vscode-list-hoverBackground);
        }

        .severity-code {
            font-family: var(--vscode-editor-font-family, var(--vscode-font-family));
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Categories</div>
        <ul class="category-list" id="categoryList">
            <!-- Generated Items -->
        </ul>
    </div>
    
    <div class="content">
        <div class="header">
            <h1 style="margin: 0 0 10px 0; font-size: 1.5em; font-weight: normal;">GLua Settings</h1>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search settings...">
                <span class="search-clear" id="searchClear">✕</span>
            </div>
            <div id="searchResultsInfo" class="search-results-info"></div>
        </div>
        <div id="mainContent" class="settings-body">
            <div class="workspace-config-banner" role="note" aria-label="Workspace configuration information">
                <strong>Workspace Configuration</strong>
                <div>These settings are saved to <code>.gluarc.json</code> in your workspace root. This is the GLua language server configuration — it is separate from your VS Code settings.</div>
            </div>
            <div id="settingsSections">
                <!-- Generated Sections -->
            </div>
            <div id="noResultsState" class="no-results-state" aria-live="polite">🔍 No results<br>No settings match your search</div>
        </div>
    </div>

    <div id="toast" class="toast">External config updated</div>

    <script nonce="{{nonce}}">
        const vscode = acquireVsCodeApi();
        
        let currentState = {
            categories: [],
            config: {}
        };

        const DIAGNOSTIC_CODES = [
            'none',
            'syntax-error',
            'doc-syntax-error',
            'type-not-found',
            'missing-return',
            'param-type-mismatch',
            'missing-parameter',
            'redundant-parameter',
            'unreachable-code',
            'unused',
            'unused-self',
            'undefined-global',
            'deprecated',
            'access-invisible',
            'discard-returns',
            'undefined-field',
            'local-const-reassign',
            'iter-variable-reassign',
            'duplicate-type',
            'redefined-local',
            'redefined-label',
            'code-style-check',
            'need-check-nil',
            'await-in-sync',
            'annotation-usage-error',
            'return-type-mismatch',
            'missing-return-value',
            'redundant-return-value',
            'undefined-doc-param',
            'duplicate-doc-field',
            'unknown-doc-tag',
            'missing-fields',
            'inject-field',
            'circle-doc-class',
            'incomplete-signature-doc',
            'missing-global-doc',
            'assign-type-mismatch',
            'duplicate-require',
            'non-literal-expressions-in-assert',
            'unbalanced-assignments',
            'unnecessary-assert',
            'unnecessary-if',
            'duplicate-set-field',
            'duplicate-index',
            'generic-constraint-mismatch',
            'cast-type-mismatch',
            'require-module-not-visible',
            'enum-value-mismatch',
            'preferred-local-alias',
            'read-only',
            'global-in-non-module',
            'attribute-param-type-mismatch',
            'attribute-missing-parameter',
            'attribute-redundant-parameter',
            'invert-if',
            'call-non-callable',
            'gmod-invalid-hook-name',
            'gmod-realm-misuse',
            'gmod-realm-misuse-risky',
            'gmod-unknown-net-message',
            'gmod-duplicate-system-registration'
        ];

        const DIAGNOSTIC_SEVERITY_VALUES = ['error', 'warning', 'information', 'hint'];
        const DIAGNOSTIC_DEFAULT_SEVERITY = {
            'syntax-error': 'error',
            'doc-syntax-error': 'error',
            'unreachable-code': 'hint',
            'unused': 'hint',
            'unused-self': 'hint',
            'undefined-global': 'error',
            'deprecated': 'hint',
            'local-const-reassign': 'error',
            'annotation-usage-error': 'error',
            'redefined-local': 'hint',
            'duplicate-require': 'hint',
            'iter-variable-reassign': 'error',
            'preferred-local-alias': 'hint',
            'gmod-realm-misuse-risky': 'hint',
            'gmod-duplicate-system-registration': 'hint'
        };

        const HIDDEN_SETTINGS = new Set([
            'workspace.preloadFileSize',
            'runtime.frameworkVersions',
            'runtime.version',
            'hint.enable',
            'signature.detailSignatureHelper',
            'strict.typeCall',
            'doc.rstDefaultRole',
            'doc.rstPrimaryDomain',
        ]);

        const DESCRIPTION_OVERRIDES = {
            'resource.paths': 'File paths used for document link resolution (ctrl+click on string literals). Not used for module indexing.',
            'runtime.special': 'Maps special function names to their semantic behavior (e.g., marks `require` as a module loader, `type` as a type-check function). Affects how the analyzer treats calls to these functions.',
            'diagnostics.enables': 'Force-enables specific diagnostic codes. Note: if a code is in both this list and the `disable` list, `disable` takes precedence.',
            'diagnostics.globals': 'Suppresses "undefined-global" diagnostics for these specific variable names. Use this for globals injected by the GMod runtime that the analyzer cannot detect automatically.',
            'diagnostics.globalsRegex': 'Like `globals`, but uses regex patterns to match global variable names. Invalid regex patterns are silently ignored.',
            'completion.autoRequireSeparator': 'The path separator used when generating require() paths in auto-import completions. Also used when rewriting require paths on file relocation.',
            'completion.postfix': 'The trigger character for postfix code snippets (e.g., `.if`, `.for`). Set to empty string to disable postfix completions.',
            'hover.customDetail': 'Controls the verbosity level of hover documentation (1–255). Leave empty for the default level. Higher values show more detail.',
            'references.fuzzySearch': 'When an exact symbol search finds no results, falls back to a broader member-key lookup. This is not true fuzzy matching.',
            'references.shortStringSearch': 'Includes string literals in reference searches. String values up to a certain length are indexed as potential references.',
            'strict.docBaseConstMatchBaseType': 'When enabled, literal constant types defined in `@alias` annotations can match their base primitive types (e.g., an integer alias can accept `number` values).',
            'strict.metaOverrideFileDefine': 'When enabled, type definitions from meta files (like the GMod annotations) take precedence over definitions in local project files.',
            'strict.requireExportGlobal': 'When enabled, library modules must use `---@export global` to make their symbols visible in auto-import. Tightens library isolation.',
            'strict.requirePath': 'When enabled, require() path resolution is exact. When disabled, partial/fuzzy module resolution is allowed and require paths are rewritten on file rename.',
            'doc.privateName': 'Field name patterns treated as private (e.g., `m_*` marks `obj.m_id` as private). Private fields can only be accessed within the defining class.',
            'semanticTokens.renderDocumentationMarkup': 'When enabled, Markdown in documentation comments is rendered in hover popups and tooltips instead of shown as raw text.',
            'doc.syntax': 'Documentation comment syntax style. Use `EmmyLua` (default) for EmmyLua/LuaCATS annotations — the standard for GMod. Myst and RST are for non-GMod documentation workflows.',
        };

        const PATH_FIELD_KEYWORDS = ['library', 'root', 'path', 'dir', 'ignore', 'resource', 'package'];

        // --- Init ---
        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'init':
                    currentState.categories = message.categories;
                    currentState.config = message.config;
                    renderSettings();
                    setupObservers();
                    setupSearch();
                    break;
                case 'configUpdated':
                    currentState.config = message.config;
                    updateAllWidgetValues();
                    showToast();
                    break;
            }
        });

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Search Logic ---
        function setupSearch() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('searchClear');

            input.addEventListener('input', (e) => {
                const query = e.target.value;
                updateFilter(query);
                clearBtn.style.display = query ? 'block' : 'none';
            });

            clearBtn.addEventListener('click', () => {
                input.value = '';
                updateFilter('');
                clearBtn.style.display = 'none';
                input.focus();
            });
        }

        function updateFilter(query) {
            const cleanQuery = query.trim().toLowerCase();
            const sections = document.querySelectorAll('section');
            const items = document.querySelectorAll('.category-item');
            const info = document.getElementById('searchResultsInfo');
            const noResultsState = document.getElementById('noResultsState');
            
            let totalMatches = 0;

            sections.forEach((section, index) => {
                let sectionVisibleCount = 0;
                const rows = section.querySelectorAll('.setting-row');
                
                rows.forEach(row => {
                    const labelEl = row.querySelector('.setting-label');
                    const descEl = row.querySelector('.setting-description');
                    const pathText = row.dataset.path || "";

                    // Reset
                    if (labelEl) labelEl.innerHTML = labelEl.textContent;
                    if (descEl) descEl.innerHTML = descEl.textContent;

                    const labelText = labelEl ? labelEl.textContent : "";
                    const descText = descEl ? descEl.textContent : "";

                    const match = !cleanQuery || 
                                  labelText.toLowerCase().includes(cleanQuery) || 
                                  descText.toLowerCase().includes(cleanQuery) || 
                                  pathText.toLowerCase().includes(cleanQuery);
                    
                    if (match) {
                        setRowVisibility(row, true);
                        sectionVisibleCount++;
                        if (cleanQuery) {
                             if (labelEl) highlightElement(labelEl, cleanQuery);
                             if (descEl) highlightElement(descEl, cleanQuery);
                        }
                    } else {
                        setRowVisibility(row, false);
                    }
                });

                if (sectionVisibleCount > 0) {
                    section.style.display = 'block';
                    if (items[index]) items[index].style.display = 'block';
                    totalMatches += sectionVisibleCount;
                } else {
                    section.style.display = 'none';
                    if (items[index]) items[index].style.display = 'none';
                }
            });

            if (cleanQuery) {
                info.textContent = totalMatches === 0
                    ? 'No settings match your search'
                    : `Found ${totalMatches} matching setting${totalMatches === 1 ? '' : 's'}`;
            } else {
                info.textContent = "";
            }

            if (noResultsState) {
                noResultsState.style.display = cleanQuery && totalMatches === 0 ? 'flex' : 'none';
            }
        }

        function setRowVisibility(row, visible) {
            if (row.__filterHideTimer) {
                clearTimeout(row.__filterHideTimer);
                row.__filterHideTimer = undefined;
            }

            if (visible) {
                row.style.display = '';
                requestAnimationFrame(() => row.classList.remove('is-filtered-out'));
                return;
            }

            row.classList.add('is-filtered-out');
            row.__filterHideTimer = setTimeout(() => {
                if (row.classList.contains('is-filtered-out')) {
                    row.style.display = 'none';
                }
                row.__filterHideTimer = undefined;
            }, 55);
        }

        function highlightElement(el, query) {
            const text = el.textContent;
            const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
            el.innerHTML = text.replace(regex, '<mark>$1</mark>');
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // --- Logic: Value Access ---
        function getValue(path, defaultValue) {
            let current = currentState.config;
            for (const key of path) {
                if (current === undefined || current === null) break;
                current = current[key];
            }
            return current !== undefined ? current : defaultValue;
        }

        function sendChange(path, value) {
            // Optimistic update
            // (In a real app we might wait, but for settings, instant feedback is good)
            vscode.postMessage({ type: 'change', path, value });
        }

        function isSeverityField(field) {
            return Array.isArray(field.path)
                && field.path.length >= 2
                && field.path[0] === 'diagnostics'
                && field.path[1] === 'severity';
        }

        function getDiagnosticDefaultSeverity(code) {
            return DIAGNOSTIC_DEFAULT_SEVERITY[code] || 'warning';
        }

        function normalizeSeverityOverrides(value) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
                return {};
            }

            const normalized = {};
            for (const [key, severity] of Object.entries(value)) {
                if (DIAGNOSTIC_SEVERITY_VALUES.includes(severity)) {
                    normalized[key] = severity;
                }
            }
            return normalized;
        }

        function toTitleCase(value) {
            return value.charAt(0).toUpperCase() + value.slice(1);
        }

        function getFieldPathKey(field) {
            if (!field || !Array.isArray(field.path)) {
                return '';
            }

            return field.path.join('.');
        }

        function shouldHideField(field) {
            const fieldPathKey = getFieldPathKey(field);
            return HIDDEN_SETTINGS.has(fieldPathKey);
        }

        function getFieldDescription(field) {
            const fieldPathKey = getFieldPathKey(field);
            if (fieldPathKey && typeof DESCRIPTION_OVERRIDES[fieldPathKey] === 'string') {
                return DESCRIPTION_OVERRIDES[fieldPathKey];
            }

            return field.description;
        }

        function isSingleLineControlField(field) {
            if (isSeverityField(field)) {
                return false;
            }

            if (field.type === 'boolean' || field.type === 'number' || field.type === 'integer') {
                return true;
            }

            return (field.type === 'string' || field.type === 'enum')
                && Array.isArray(field.enumValues)
                && field.enumValues.length > 0;
        }

        function getFieldTokens(field) {
            const values = [];
            if (Array.isArray(field.path)) {
                values.push(...field.path);
            }
            if (typeof field.key === 'string') {
                values.push(field.key);
            }
            if (typeof field.label === 'string') {
                values.push(field.label);
            }

            return values.map((entry) => String(entry).toLowerCase());
        }

        function allValuesLookLikePaths(value) {
            if (!Array.isArray(value) || value.length === 0) {
                return false;
            }

            return value.every((entry) => typeof entry === 'string' && /[\\/]/.test(entry));
        }

        function isPathLikeArrayField(field, value) {
            if (field.type !== 'array' || !field.items || field.items.type !== 'string') {
                return false;
            }

            if (Array.isArray(field.items.enumValues) && field.items.enumValues.length > 0) {
                return false;
            }

            const tokens = getFieldTokens(field);
            const inWorkspace = Array.isArray(field.path) && field.path[0] === 'workspace';
            const tokenLooksPathLike = tokens.some((token) => PATH_FIELD_KEYWORDS.some((keyword) => token.includes(keyword)));

            return inWorkspace || tokenLooksPathLike || allValuesLookLikePaths(value);
        }

        function renderPathArrayInput(field, value, onChange) {
            const container = document.createElement('div');
            container.className = 'path-list-container';

            const table = document.createElement('div');
            table.className = 'path-table';
            container.appendChild(table);

            const addRow = document.createElement('div');
            addRow.className = 'path-add-row';

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Enter path...';
            addRow.appendChild(input);

            const addBtn = document.createElement('button');
            addBtn.className = 'add-btn';
            addBtn.textContent = '+ Add';
            addRow.appendChild(addBtn);

            container.appendChild(addRow);

            let currentArr = Array.isArray(value)
                ? [...value]
                : (Array.isArray(field.default) ? [...field.default] : []);

            const save = () => onChange(currentArr);

            const renderRows = () => {
                table.innerHTML = '';

                if (currentArr.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'path-empty';
                    empty.textContent = 'No paths added';
                    table.appendChild(empty);
                    return;
                }

                currentArr.forEach((entry, index) => {
                    const row = document.createElement('div');
                    row.className = 'path-row';

                    const pathCell = document.createElement('div');
                    pathCell.className = 'path-cell';
                    pathCell.textContent = String(entry);
                    row.appendChild(pathCell);

                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-btn';
                    removeBtn.textContent = '×';
                    removeBtn.type = 'button';
                    removeBtn.setAttribute('aria-label', `Remove path ${entry}`);
                    removeBtn.onclick = () => {
                        currentArr.splice(index, 1);
                        save();
                        renderRows();
                    };

                    row.appendChild(removeBtn);
                    table.appendChild(row);
                });
            };

            const addPath = () => {
                const raw = input.value.trim();
                if (!raw) {
                    return;
                }

                currentArr.push(raw);
                save();
                renderRows();
                input.value = '';
                input.focus();
            };

            addBtn.onclick = addPath;
            input.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    addPath();
                }
            });

            renderRows();
            return container;
        }

        function renderSeverityTable(field, severityConfig) {
            const container = document.createElement('div');
            container.className = 'severity-table-container';

            const toolbar = document.createElement('div');
            toolbar.className = 'severity-table-toolbar';

            const overridesCount = document.createElement('div');
            overridesCount.className = 'severity-overrides-count';
            toolbar.appendChild(overridesCount);

            const filterInput = document.createElement('input');
            filterInput.type = 'text';
            filterInput.className = 'severity-filter';
            filterInput.placeholder = 'Filter codes...';
            toolbar.appendChild(filterInput);

            container.appendChild(toolbar);

            const scroll = document.createElement('div');
            scroll.className = 'severity-table-scroll';

            const table = document.createElement('table');
            table.className = 'severity-table';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');

            const codeHeader = document.createElement('th');
            codeHeader.textContent = 'Diagnostic Code';
            headerRow.appendChild(codeHeader);

            const severityHeader = document.createElement('th');
            severityHeader.textContent = 'Severity';
            headerRow.appendChild(severityHeader);

            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            table.appendChild(tbody);
            scroll.appendChild(table);
            container.appendChild(scroll);

            const localOverrides = normalizeSeverityOverrides(severityConfig);

            const updateOverridesCount = () => {
                overridesCount.textContent = `${Object.keys(localOverrides).length} overrides active`;
            };

            const rows = [];

            DIAGNOSTIC_CODES.forEach((code) => {
                const row = document.createElement('tr');
                row.dataset.code = code;

                const codeCell = document.createElement('td');
                codeCell.className = 'severity-code';
                codeCell.textContent = code;
                row.appendChild(codeCell);

                const selectCell = document.createElement('td');
                const select = document.createElement('select');

                const defaultSeverity = getDiagnosticDefaultSeverity(code);
                const defaultOption = document.createElement('option');
                defaultOption.value = '';
                defaultOption.textContent = `Default (${defaultSeverity})`;
                select.appendChild(defaultOption);

                DIAGNOSTIC_SEVERITY_VALUES.forEach((severity) => {
                    const option = document.createElement('option');
                    option.value = severity;
                    option.textContent = toTitleCase(severity);
                    select.appendChild(option);
                });

                const currentValue = localOverrides[code];
                select.value = currentValue && DIAGNOSTIC_SEVERITY_VALUES.includes(currentValue) ? currentValue : '';

                select.onchange = () => {
                    const selectedValue = select.value;
                    if (selectedValue) {
                        localOverrides[code] = selectedValue;
                    } else {
                        delete localOverrides[code];
                    }
                    updateOverridesCount();
                    sendChange([...field.path, code], selectedValue || null);
                };

                selectCell.appendChild(select);
                row.appendChild(selectCell);

                tbody.appendChild(row);
                rows.push({ row, code });
            });

            const updateRowFilter = () => {
                const query = filterInput.value.trim().toLowerCase();
                rows.forEach(({ row, code }) => {
                    row.style.display = !query || code.includes(query) ? '' : 'none';
                });
            };

            filterInput.addEventListener('input', updateRowFilter);

            updateOverridesCount();
            updateRowFilter();

            return container;
        }

        // --- Rendering ---
        function renderSettings() {
            const catList = document.getElementById('categoryList');
            const sectionsContent = document.getElementById('settingsSections');
            
            catList.innerHTML = '';
            sectionsContent.innerHTML = '';

            let visibleCategoryIndex = 0;

            currentState.categories.forEach((cat) => {
                const visibleFields = Array.isArray(cat.fields)
                    ? cat.fields.filter((field) => !shouldHideField(field))
                    : [];

                if (visibleFields.length === 0) {
                    return;
                }

                const categoryId = `cat-${visibleCategoryIndex}`;

                // Sidebar Item
                const li = document.createElement('li');
                li.className = 'category-item';
                li.textContent = cat.label;
                li.dataset.target = categoryId;
                li.onclick = () => {
                   document.getElementById(categoryId).scrollIntoView();
                   document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
                   li.classList.add('active');
                };
                catList.appendChild(li);

                // Main Section
                const section = document.createElement('section');
                section.id = categoryId;
                
                const h2 = document.createElement('h2');
                h2.textContent = cat.label;
                section.appendChild(h2);

                if (cat.description) {
                    const desc = document.createElement('div');
                    desc.className = 'section-description';
                    desc.textContent = cat.description;
                    section.appendChild(desc);
                }

                visibleFields.forEach(field => {
                    section.appendChild(createFieldWidget(field));
                });

                sectionsContent.appendChild(section);
                visibleCategoryIndex++;
            });

            // Re-apply filter if search input has value
            const searchInput = document.getElementById('searchInput');
            if (searchInput && searchInput.value) {
                updateFilter(searchInput.value);
            }
        }

        function createFieldWidget(field) {
            if (shouldHideField(field)) {
                return null;
            }

            const row = document.createElement('div');
            const isInlineControl = isSingleLineControlField(field);
            row.className = `setting-row ${isInlineControl ? 'setting-row-inline' : 'setting-row-stacked'}`;
            row.dataset.path = JSON.stringify(field.path); // For updates

            const textContainer = document.createElement('div');
            textContainer.className = 'setting-text';

            const labelRow = document.createElement('div');
            labelRow.className = 'setting-label-row';
            const label = document.createElement('span');
            label.className = 'setting-label';
            label.textContent = field.label;
            labelRow.appendChild(label);
            textContainer.appendChild(labelRow);

            const fieldDescription = getFieldDescription(field);
            if (fieldDescription) {
                const desc = document.createElement('div');
                desc.className = 'setting-description';
                desc.textContent = fieldDescription;
                textContainer.appendChild(desc);
            }

            row.appendChild(textContainer);

            const inputContainer = document.createElement('div');
            inputContainer.className = 'setting-input-container';
            const currentValue = getValue(field.path);

            let widget;
            if (isSeverityField(field)) {
                widget = renderSeverityTable(field, currentValue);
            } else {
                widget = generateInput(field, currentValue, (newValue) => {
                    sendChange(field.path, newValue);
                });
            }

            inputContainer.appendChild(widget);
            row.appendChild(inputContainer);

            return row;
        }

        function generateInput(field, value, onChange) {
            const { type, nullable, enumValues, items } = field;
            
            // 1. Boolean
            if (type === 'boolean') {
                if (nullable) {
                    const select = document.createElement('select');
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = 'Default (inherit)';
                    select.appendChild(defaultOption);

                    const enabledOption = document.createElement('option');
                    enabledOption.value = 'true';
                    enabledOption.textContent = 'Enabled';
                    select.appendChild(enabledOption);

                    const disabledOption = document.createElement('option');
                    disabledOption.value = 'false';
                    disabledOption.textContent = 'Disabled';
                    select.appendChild(disabledOption);
                    
                    // Set initial
                    if (value === true) select.value = 'true';
                    else if (value === false) select.value = 'false';
                    else select.value = '';

                    select.onchange = () => {
                        if (select.value === 'true') onChange(true);
                        else if (select.value === 'false') onChange(false);
                        else onChange(null);
                    };
                    return select;
                } else {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'checkbox-wrapper';

                    const toggle = document.createElement('label');
                    toggle.className = 'toggle-switch';

                    const cb = document.createElement('input');
                    cb.type = 'checkbox';

                    const slider = document.createElement('span');
                    slider.className = 'toggle-slider';

                    const resolvedValue = value === undefined || value === null
                        ? field.default === true
                        : value === true;
                    cb.checked = resolvedValue;
                    
                    cb.onchange = () => onChange(cb.checked);

                    toggle.appendChild(cb);
                    toggle.appendChild(slider);
                    wrapper.appendChild(toggle);

                    const label = document.createElement('span');
                    label.textContent = cb.checked ? 'Enabled' : 'Disabled';
                    cb.addEventListener('change', () => label.textContent = cb.checked ? 'Enabled' : 'Disabled');
                    
                    wrapper.appendChild(label);
                    return wrapper;
                }
            }

            // 2. String / Enum
            if (type === 'string' || type === 'enum') {
                if (enumValues && enumValues.length > 0) {
                    const select = document.createElement('select');
                    
                    if (nullable) {
                        const def = document.createElement('option');
                        def.value = "";
                        def.textContent = "Default";
                        select.appendChild(def);
                    }

                    enumValues.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v;
                        opt.textContent = v;
                        select.appendChild(opt);
                    });

                    select.value = value !== undefined && value !== null ? value : "";
                    select.onchange = () => {
                        const val = select.value;
                        onChange(val === "" ? null : val);
                    };
                    return select;
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = value !== undefined && value !== null ? value : '';
                    input.placeholder = field.default !== undefined ? field.default : '';
                    
                    input.onchange = () => {
                        const val = input.value.trim();
                        onChange(val === "" ? null : val);
                    };
                    return input;
                }
            }

            // 3. Number / Integer
            if (type === 'number' || type === 'integer') {
                const input = document.createElement('input');
                input.type = 'number';
                if (type === 'integer') input.step = "1";
                input.value = value !== undefined && value !== null ? value : '';
                input.placeholder = field.default !== undefined ? field.default : '';

                input.onchange = () => {
                    if (input.value === "") {
                        onChange(null);
                    } else {
                        const num = type === 'integer' ? parseInt(input.value) : parseFloat(input.value);
                        onChange(isNaN(num) ? null : num);
                    }
                };
                return input;
            }

            // 5. Array of Strings/Enums
            if (type === 'array' && items && (items.type === 'string' || items.type === 'enum' || items.type === 'number' || items.type === 'integer')) {
                if (isPathLikeArrayField(field, value)) {
                    return renderPathArrayInput(field, value, onChange);
                }

                const container = document.createElement('div');
                const tagList = document.createElement('div');
                tagList.className = 'tags-container';
                
                let currentArr = Array.isArray(value)
                    ? [...value]
                    : (Array.isArray(field.default) ? [...field.default] : []);

                const save = () => onChange(currentArr);

                const renderTags = () => {
                    tagList.innerHTML = '';

                    if (currentArr.length === 0) {
                        return;
                    }

                    currentArr.forEach((item, idx) => {
                        const tag = document.createElement('div');
                        tag.className = 'tag';

                        const text = document.createElement('span');
                        text.className = 'tag-value';
                        text.textContent = String(item);
                        tag.appendChild(text);

                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'remove-btn';
                        removeBtn.type = 'button';
                        removeBtn.textContent = '×';
                        removeBtn.setAttribute('aria-label', `Remove item ${item}`);
                        removeBtn.onclick = () => {
                            currentArr.splice(idx, 1);
                            save();
                            renderTags();
                        };

                        tag.appendChild(removeBtn);
                        tagList.appendChild(tag);
                    });
                };
                renderTags();
                container.appendChild(tagList);

                // Add Row
                const addRow = document.createElement('div');
                addRow.className = 'add-tag-row';
                
                let inputEl;
                if (items.enumValues) {
                    inputEl = document.createElement('select');
                    items.enumValues.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v;
                        opt.textContent = v;
                        inputEl.appendChild(opt);
                    });
                } else {
                    inputEl = document.createElement('input');
                    inputEl.type = items.type === 'number' || items.type === 'integer' ? 'number' : 'text';
                    inputEl.placeholder = "Add Item";
                }

                const addBtn = document.createElement('button');
                addBtn.className = 'add-btn';
                addBtn.textContent = 'Add';
                addBtn.onclick = () => {
                    let val = typeof inputEl.value === 'string' ? inputEl.value.trim() : inputEl.value;
                    if (items.type === 'number' || items.type === 'integer') {
                         val = parseFloat(val);
                         if (isNaN(val)) return;
                    }
                    if (val !== "" && val !== null) {
                        currentArr.push(val);
                        save();
                        renderTags();
                        if (inputEl.tagName === 'INPUT') inputEl.value = '';
                    }
                };

                addRow.appendChild(inputEl);
                addRow.appendChild(addBtn);
                container.appendChild(addRow);
                return container;
            }

            // 6. Object (Nested properties)
            if (type === 'object' && field.properties) {
                const details = document.createElement('details');
                const summary = document.createElement('summary');
                summary.textContent = field.label || "Settings";
                details.appendChild(summary);

                const container = document.createElement('div');
                container.style.marginLeft = "10px";
                container.style.marginTop = "10px";
                
                // If value is null/undefined, treat as empty object for rendering children
                // (Though strictly config might be missing it)
                const objValue = value || {};

                field.properties.forEach(subField => {
                     // For nested objects, we need to construct a "fake" onChange
                     // that updates the PARENT object
                     const subOnChange = (subVal) => {
                         const newObj = { ...objValue };
                         newObj[subField.key] = subVal;
                         onChange(newObj);
                     };

                     // We need to pass the "virtual" path or sub-value
                     // Ideally we reuse createFieldWidget but we need to intercept the onChange
                     // Let's manually build standard field style here
                     
                     const row = document.createElement('div');
                     row.className = 'setting-row';
                     
                     const label = document.createElement('div');
                     label.className = 'setting-label';
                     label.textContent = subField.label;
                     row.appendChild(label);
                     
                     const subFieldDescription = getFieldDescription(subField);
                     if (subFieldDescription) {
                         const desc = document.createElement('div');
                         desc.className = 'setting-description';
                         desc.textContent = subFieldDescription;
                         row.appendChild(desc);
                     }
                     
                     const subWidget = generateInput(subField, objValue[subField.key], subOnChange);
                     row.appendChild(subWidget);
                     
                     container.appendChild(row);
                });

                details.appendChild(container);
                return details;
            }

            // 7. Array of Objects (Complex)
            if (type === 'array' && items && items.type === 'object') {
                const container = document.createElement('div');
                let currentArr = Array.isArray(value) ? [...value] : [];
                
                const list = document.createElement('div');
                
                const renderList = () => {
                    list.innerHTML = '';
                    currentArr.forEach((item, idx) => {
                        const row = document.createElement('div');
                        row.className = 'object-list-item';
                        
                        // Header
                        const header = document.createElement('div');
                        header.style.display = 'flex';
                        header.style.justifyContent = 'space-between';
                        header.style.marginBottom = '8px';
                        header.innerHTML = `<strong>Item ${idx + 1}</strong>`;
                        
                        const delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.textContent = 'Remove';
                        delBtn.onclick = () => {
                            currentArr.splice(idx, 1);
                            onChange(currentArr);
                            renderList();
                        };
                        header.appendChild(delBtn);
                        row.appendChild(header);

                        // Properties
                        if (items.properties) {
                             items.properties.forEach(subField => {
                                 const subRow = document.createElement('div');
                                 subRow.style.marginBottom = '8px';
                                 
                                 const lbl = document.createElement('div');
                                 lbl.className = 'setting-description'; // smaller font
                                 lbl.textContent = subField.label;
                                 subRow.appendChild(lbl);
                                 
                                 const subOnChange = (newVal) => {
                                     const newItem = { ...item };
                                     newItem[subField.key] = newVal;
                                     currentArr[idx] = newItem;
                                     onChange(currentArr);
                                 };
                                 
                                 subRow.appendChild(generateInput(subField, item[subField.key], subOnChange));
                                 row.appendChild(subRow);
                             });
                        }
                        
                        list.appendChild(row);
                    });
                };
                
                renderList();
                container.appendChild(list);
                
                const addBtn = document.createElement('button');
                addBtn.className = 'add-btn';
                addBtn.textContent = 'Add Item';
                addBtn.onclick = () => {
                    currentArr.push({});
                    onChange(currentArr);
                    renderList();
                };
                container.appendChild(addBtn);
                
                return container;
            }

            // 8. Fallback / Raw JSON
            const ta = document.createElement('textarea');
            ta.className = 'json-input';
            ta.value = value ? JSON.stringify(value, null, 2) : '';
            ta.placeholder = field.default ? JSON.stringify(field.default) : '{}';
            
            ta.onchange = () => {
                try {
                    const parsed = ta.value ? JSON.parse(ta.value) : null;
                    onChange(parsed);
                    ta.style.borderColor = 'var(--vscode-input-border)';
                } catch (e) {
                    ta.style.borderColor = 'var(--vscode-inputValidation-errorBorder)';
                }
            };
            return ta;
        }

        // --- Updates ---
        function updateAllWidgetValues() {
            // Re-rendering everything is safer/easier to keep sync with deeply nested structures
            // But we requested "update values without re-rendering".
            // Implementation: Find all .setting-row, get path, re-generate input area.
            // A full re-render is actually smoother for layout changes, but let's try to update in place.
            
            const rows = document.querySelectorAll('.setting-row');
            rows.forEach(row => {
                const path = JSON.parse(row.dataset.path);
                const newVal = getValue(path);
                // We actually need field descriptor to rebuild widget :| 
                // Since we don't have easy map to field desc in DOM, let's just re-render fully for correctness.
                // It's fast enough for settings pages.
            });
            renderSettings();
        }

        // --- Sidebar highlighting ---
        function setupObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        document.querySelectorAll('.category-item').forEach(item => {
                            if (item.dataset.target === id) item.classList.add('active');
                            else item.classList.remove('active');
                        });
                    }
                });
            }, { threshold: 0.2 });

            document.querySelectorAll('section').forEach(section => {
                observer.observe(section);
            });
        }

    </script>
